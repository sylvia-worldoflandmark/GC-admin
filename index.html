function crecToggle(pid){ crecExpanded[pid]=!crecExpanded[pid]; updateCrecTable(); }

async function crecMarkAll(pid,status){
  var paidAt=status==='paid'?new Date().toISOString():null;
  var now=new Date().toISOString();
  var by=currentUser?currentUser.full_name:'admin';
  var r=await sb.from('commission_records').update({partner_payment_status:status,partner_paid_at:paidAt,updated_by:by}).eq('project_id',pid).not('business_partner_id','is',null);
  if(r.error){ _toast('更新失敗：'+r.error.message,'err'); return; }
  DB.commission_records.filter(function(c){ return c.project_id===pid&&c.business_partner_id; }).forEach(function(c){ c.partner_payment_status=status; c.partner_paid_at=paidAt; });
  // 同步 financial_records 的 payable_partner 狀態
  await sb.from('financial_records').update({status:status,updated_time:now,updated_by:by}).eq('project_id',pid).eq('record_type','payable_partner');
  renderCommissionRecords();
  _toast(status==='paid'?'已標記商務獎金已支付':'已還原為未支付');
}

async function crecMarkOne(id,status){
  var c=_find(DB.commission_records,id); if(!c) return;
  var paidAt=status==='paid'?new Date().toISOString():null;
  var now=new Date().toISOString();
  var by=currentUser?currentUser.full_name:'admin';
  var r=await sb.from('commission_records').update({partner_payment_status:status,partner_paid_at:paidAt,updated_by:by}).eq('id',id);
  if(r.error){ _toast('更新失敗：'+r.error.message,'err'); return; }
  c.partner_payment_status=status; c.partner_paid_at=paidAt;
  // 同步 financial_records：該 BP 在此專案的所有 commission_records 都 paid → financial paid
  var bpId=c.business_partner_id;
  if(bpId){
    var allBpPaid=DB.commission_records.filter(function(x){ return x.project_id===c.project_id&&x.business_partner_id===bpId; }).every(function(x){ return x.partner_payment_status==='paid'; });
    await sb.from('financial_records').update({status:allBpPaid?'paid':'pending',updated_time:now,updated_by:by}).eq('project_id',c.project_id).eq('record_type','payable_partner').eq('counterparty_id',bpId);
  }
  updateCrecTable();
  _toast(status==='paid'?'已標記已支付':'已還原');
}

function goCrecPage(p){ crecPage=p; updateCrecTable(); }
function exportCommissionRecords(){
  // 蒐集目前篩選後的資料（逐 commission_record 展開）
  var allGroups={}; var allOrder=[];
  DB.commission_records.forEach(function(c){
    if(!allGroups[c.project_id]){ allGroups[c.project_id]=[]; allOrder.push(c.project_id); }
    allGroups[c.project_id].push(c);
  });
  var stl={paid:'已支付',pending:'未支付'};
  var header=['專案編號','客戶','模式','服務商','商務夥伴','訂單類型','毛利（未稅）','商務%','商務獎金（含稅）','支付狀態','支付時間','最後操作人'];
  var lines=[header.join(',')];
  allOrder.forEach(function(pid){
    var recs=allGroups[pid];
    if(crecFilterUnpaid&&!recs.some(function(c){ return (c.partner_payment_status||'pending')==='pending'&&c.business_partner_id; })) return;
    if(!_crecMatchSearch(pid,recs)) return;
    var proj=_find(DB.projects,pid);
    recs.forEach(function(c){
      var orderTypeLabel=c.order_type==='first_order'?'首單':c.order_type==='repurchase'?'回購':c.order_type==='intermediary'?'居間':(c.order_type||'');
      var modeLabel=proj&&proj.cooperation_mode==='intermediary'?'居間':'主理人';
      var status=c.partner_payment_status||'pending';
      var cols=[
        '"'+_projOf(pid)+'"',
        '"'+(proj?_custName(proj.customer_id):'')+'"',
        '"'+modeLabel+'"',
        '"'+_spName(c.service_provider_id)+'"',
        '"'+(c.business_partner_id?_bpName(c.business_partner_id):'—')+'"',
        '"'+orderTypeLabel+'"',
        Number(c.profit_untaxed||0),
        Number(c.partner_percent||0),
        Number(c.partner_amount_taxed||0),
        '"'+(stl[status]||status)+'"',
        '"'+(c.partner_paid_at?_dt(c.partner_paid_at):'')+'"',
        '"'+(c.updated_by||'')+'"'
      ];
      lines.push(cols.join(','));
    });
  });
  var bom='﻿';
  var blob=new Blob([bom+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='商務分潤紀錄_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },100);
  _toast('已匯出');
}

// ════════════ 帳務紀錄 financial_records（唯讀）════════════
var finPage=1;
async function loadFinancialRecords(){
  var main=document.getElementById('main-content'); main.innerHTML=_loading();
  await _ensureRefData();
  var pr=await sb.from('projects').select('id,project_no,customer_id,cooperation_mode,quote_settings'); if(pr.data){ pr.data.forEach(function(p){ if(!_find(DB.projects,p.id)) DB.projects.push(p); else { var ex=_find(DB.projects,p.id); ex.cooperation_mode=p.cooperation_mode; ex.quote_settings=p.quote_settings; } }); }
  var [fr,pprR,crR]=await Promise.all([
    sb.from('financial_records').select('*').order('id',{ascending:false}),
    sb.from('provider_payment_records').select('project_id,service_provider_id,status,client_received_at'),
    sb.from('commission_records').select('project_id,business_partner_id,partner_payment_status')
  ]);
  if(fr.error){ main.innerHTML=_errBox(fr.error.message); return; }
  DB.financial_records=fr.data||[];
  DB.fin_pprs=pprR.data||[];
  DB.fin_crecs=crR.data||[];
  finPage=1; renderFinancialRecords();
}
// 根據 provider_payment_records / commission_records 計算帳務狀態
function _computeFinStatus(f){
  if(f.status==='cancelled'||f.status==='void') return f.status;
  var pprs=DB.fin_pprs||[]; var crecs=DB.fin_crecs||[];
  var pid=f.project_id;
  if(f.record_type==='receivable'){
    var proj=pprs.filter(function(r){ return r.project_id===pid; });
    if(!proj.length) return f.status;
    return proj.every(function(r){ return !!r.client_received_at; })?'paid':'pending';
  }
  if(f.record_type==='payable_provider'){
    var spId=f.counterparty_id;
    var spPprs=pprs.filter(function(r){ return r.project_id===pid&&r.service_provider_id===spId; });
    if(!spPprs.length) return f.status;
    return spPprs.every(function(r){ return r.status==='paid'; })?'paid':'pending';
  }
  if(f.record_type==='payable_partner'){
    var bpId=f.counterparty_id;
    var bpCrecs=crecs.filter(function(r){ return r.project_id===pid&&r.business_partner_id===bpId; });
    if(!bpCrecs.length) return f.status;
    return bpCrecs.every(function(r){ return r.partner_payment_status==='paid'; })?'paid':'pending';
  }
  return f.status;
}
function _finIsIncome(f){ return f.record_type==='receivable' || f.record_type==='receivable_provider'; }
// 應收服務商（退傭）僅存在於「居間」專案；主理人專案的應收一律為客戶
// 居間模式舊格式相容：record_type='receivable' 但 counterparty 其實是服務商（新格式用 receivable_provider）
function _finIsSpReceivable(f){ return f.record_type==='receivable' && _finProjMode(f)==='intermediary' && !!_find(DB.service_providers,f.counterparty_id); }
function _orderTypeBadge(t){ if(t==='first_order') return _badge('首單','blue'); if(t==='repurchase'||t==='repeat') return _badge('回購','gray'); if(t==='intermediary') return _badge('居間','amber'); return '<span style="color:var(--text-dim);">—</span>'; }
function _finCp(f){
  if(f.record_type==='receivable') return _finIsSpReceivable(f)?_spName(f.counterparty_id):_custName(f.counterparty_id);
  return (f.record_type==='payable_provider'||f.record_type==='receivable_provider')?_spName(f.counterparty_id):_bpName(f.counterparty_id);
}
// 取得帳務紀錄對應專案的合作模式（principal=主理人 / intermediary=居間）
function _finProjMode(f){ var p=_find(DB.projects,f.project_id); return (p&&p.cooperation_mode==='intermediary')?'intermediary':'principal'; }
function _finProjModeBadge(f){ return _finProjMode(f)==='intermediary'?_badge('居間','amber'):_badge('主理人','blue'); }
var finFilter={type:'',status:'',search:'',counterparties:[],mode:''};
var _finCpOpts=[]; // 對象選項，渲染時填入
// ── 對象複選 dropdown ──
function finCpDropToggle(){
  var panel=document.getElementById('fin-cp-panel');
  if(!panel) return;
  var open=panel.style.display==='block';
  if(open){
    panel.style.display='none';
    document.removeEventListener('click',_finCpOutside);

    panel.style.display='block';
    setTimeout(function(){ document.addEventListener('click',_finCpOutside); },0);

function _finCpOutside(e){

    var panel=document.getElementById('fin-cp-panel');
    if(panel) panel.style.display='none';

}
function finCpToggle(idx,checked){

function finCpClear(){

function _finCpUpdateLabel(){
  var sel=finFilter.counterparties;
  var lbl=sel.length===0?'全部對象':(sel.length===1?sel[0]:sel.length+' 個對象');
  var el=document.getElementById('fin-cp-label'); if(el) el.textContent=lbl;

}
function _finApplyFilter(f){
  if(finFilter.search){ var pno=_projOf(f.project_id); if(pno.toLowerCase().indexOf(finFilter.search.toLowerCase())<0) return false; }
  var fMode=msSel('fin-mode'), fType=msSel('fin-type'), fStatus=msSel('fin-status');
  if(fMode.length&&fMode.indexOf(_finProjMode(f))<0) return false;
  if(fType.length&&fType.indexOf(f.record_type)<0) return false;
  if(fStatus.length&&fStatus.indexOf(_computeFinStatus(f))<0) return false;
  if(finFilter.counterparties.length&&finFilter.counterparties.indexOf(_finCp(f))<0) return false;
  return true;
}
// 依專案類型（多選）決定「類別」下拉可選項目
// 主理人：應收（客戶）、應付服務商、應付商務；居間：應收（服務商退傭）、應付商務
function _finTypeOpts(){
  var sel=msSel('fin-mode'); var hasP=sel.indexOf('principal')>=0, hasI=sel.indexOf('intermediary')>=0;
  var showP=sel.length===0||hasP, showI=sel.length===0||hasI;
  var opts=[];
  if(showP) opts.push({v:'receivable',l:'應收（客戶）'});
  if(showI) opts.push({v:'receivable_provider',l:'應收（服務商退傭）'});
  if(showP) opts.push({v:'payable_provider',l:'應付服務商'});
  opts.push({v:'payable_partner',l:'應付商務'});
  return opts;
}

// 切換專案類型：移除已不適用的類別選取後重繪
function finModeChanged(){

  MS['fin-type']=msSel('fin-type').filter(function(t){ return valid[t]; });
  finPage=1; renderFinancialRecords();

// 支援幣別清單（帳務紀錄使用）
var FIN_CURS=['TWD','USD','JPY','CNY'];
// 查 SP 的原始幣別與匯率
// 注意：結算時 _itemToTwd 用 BOT_RATES 即時匯率，此處也只用 BOT_RATES，
// 確保 reverse 計算（TWD ÷ rate）與結算一致，避免 quote_settings 鎖定匯率造成差異
function _spFxRate(spId,projectId){
  var sp=_find(DB.service_providers,spId);
  var cur=(sp&&sp.payment_currency)||'TWD';
  if(cur==='TWD'||FIN_CURS.indexOf(cur)<0) return null;
  var snap=BOT_RATES[cur];
  var rate=snap?(snap.buy+snap.sell)/2:null;
  return (rate&&rate>0)?{cur:cur,rate:rate}:null;
}
// TWD 轉原始幣別顯示金額（帶智慧 snap：_itemToTwd 四捨五入存整數 TWD，
// reverse 時會有 ≤0.5/rate ≈ 0.016 USD 的誤差；若距整數 < 0.02 就 snap 到整數）
function _fxOrigAmt(twdVal,fx){
  var n=Number(twdVal||0);
  if(!fx||n===0) return null; // null = 使用原始 TWD 顯示
  var orig=n/fx.rate;
  if(fx.cur==='JPY') return Math.round(orig);
  var r2=Math.round(orig*100)/100; // 兩位小數
  var ri=Math.round(r2);
  return (Math.abs(r2-ri)<0.02)?ri:r2; // 距整數 <0.02 → snap 到整數
}
// 查 BP 的原始幣別與匯率（同 _spFxRate，但對象是 business_partners）
function _bpFxRate(bpId){
  var bp=_find(DB.business_partners,bpId);
  var cur=(bp&&bp.payment_currency)||'TWD';
  if(cur==='TWD'||FIN_CURS.indexOf(cur)<0) return null;
  var snap=BOT_RATES[cur];
  var rate=snap?(snap.buy+snap.sell)/2:null;
  return (rate&&rate>0)?{cur:cur,rate:rate}:null;
}
// 修正 #3：commission_record 上若存有結算當時鎖定的幣別/匯率，優先採用（消除匯率漂移）；無則 fallback 即時匯率
function _spFxRateRec(c,pid){ return (c&&c.sp_fx_rate>0&&c.sp_currency&&c.sp_currency!=='TWD')?{cur:c.sp_currency,rate:Number(c.sp_fx_rate)}:_spFxRate(c?c.service_provider_id:null,pid); }
function _bpFxRateRec(c){ return (c&&c.bp_fx_rate>0&&c.bp_currency&&c.bp_currency!=='TWD')?{cur:c.bp_currency,rate:Number(c.bp_fx_rate)}:((c&&c.business_partner_id)?_bpFxRate(c.business_partner_id):null); }
// 帳務紀錄列的外幣判定（修正 #3）：優先採用該筆存下的鎖定匯率/幣別，無則依類別 fallback 即時匯率
function _finRecFx(f){
  if(f.fx_rate>0 && f.orig_currency && f.orig_currency!=='TWD') return {cur:f.orig_currency,rate:Number(f.fx_rate)};
  var isSpRecord=f.record_type==='receivable_provider'||_finIsSpReceivable(f)||f.record_type==='payable_provider';
  if(isSpRecord) return _spFxRate(f.counterparty_id,f.project_id);
  if(f.record_type==='payable_partner') return _bpFxRate(f.counterparty_id);
  return null;
}
// 商務分潤用：把 TWD 金額格式化為「CUR orig ≈ TWD xxx」字串（純內容，不含 <td>）
// showFx=false 時直接顯示 NT$ TWD（商務獎金等永遠 TWD 的欄位不傳 fx）
function _crecFxAmt(twdVal,fx,origVal){
  var n=Number(twdVal||0);
  if(!fx||n===0) return 'NT$ '+_money(n);
  // origVal：結算當時存下的外幣原值（修正 #3）；無則以匯率回推
  var orig=(origVal!=null)?Number(origVal):_fxOrigAmt(n,fx);
  var origStr=Number(orig).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
  return fx.cur+' '+origStr+'<div style="font-size:10px;color:var(--text-dim);font-weight:400;margin-top:1px;">≈ TWD '+_money(n)+'</div>';
}
function renderFinancialRecords(){
  var main=document.getElementById('main-content');

  var recvByCur={TWD:0,USD:0,JPY:0,CNY:0};

    var fx3=_finRecFx(f);
    if(fx3){ bucket[fx3.cur]+=((f.amount_orig!=null?Number(f.amount_orig):_fxOrigAmt(Number(f.amount||0),fx3))||0); return; }

      '</button>'+

        '<div style="border-top:1px solid var(--border);padding:6px 12px;">'+

        '</div>'+

    '</div>';
  var filterBar=
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center;">'+
      '<input class="cm-input" id="fin-f-search" placeholder="搜尋專案編號…" value="'+_esc(finFilter.search)+'" oninput="finFilter.search=this.value;finPage=1;updateFinTable()" style="width:300px;font-size:12.5px;padding:5px 10px;">'+
      msDropdown('fin-mode','全部專案類型',[{v:'principal',l:'主理人'},{v:'intermediary',l:'居間'}],'finModeChanged')+

      cpDropHtml+

        '<svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 3v10M6 9l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 15h12" stroke-linecap="round"/></svg>匯出 CSV'+

  main.innerHTML=_pageHeader('財務管理','帳務紀錄','financial_records','專案結案後自動產生的應收與應付')+

function exportFinancialRecords(){
  var tl={receivable:'應收（客戶）',receivable_provider:'應收（服務商退傭）',payable_provider:'應付服務商',payable_partner:'應付商務'};
  var stl={paid:'已付/收',pending:'待處理',cancelled:'已流案',void:'作廢'};
  var rows=DB.financial_records.filter(_finApplyFilter);
  var header=['專案編號','專案類型','類別','對象','未稅金額','稅金','含稅金額','狀態','建立時間','最後操作人'];
  var lines=[header.join(',')];
  rows.forEach(function(f){
    var status=_computeFinStatus(f);
    var cols=[
      '"'+_projOf(f.project_id)+'"',
      '"'+(_finProjMode(f)==='intermediary'?'居間':'主理人')+'"',
      '"'+(tl[f.record_type]||f.record_type)+'"',
      '"'+_finCp(f)+'"',
      Number(f.amount_untaxed||0),
      Number(f.tax||0),
      Number(f.amount||0),
      '"'+(stl[status]||status)+'"',
      '"'+(f.created_time?_dt(f.created_time):'')+'"',
      '"'+(f.updated_by||'')+'"'
    ];
    lines.push(cols.join(','));
  });
  var bom='﻿';
  var blob=new Blob([bom+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='帳務紀錄_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },100);
  _toast('已匯出 '+rows.length+' 筆');
}
function _finVerb(f){ return _finIsIncome(f)?'已收':'已付'; }
async function toggleFin(id){
  var f=_find(DB.financial_records,id); if(!f) return;
  if(f.status==='cancelled'){ _toast('已流案，無法更新狀態','err'); return; }
  var ns=f.status==='paid'?'pending':'paid';
  var by=currentUser?currentUser.full_name:'admin';
  var r=await sb.from('financial_records').update({status:ns,updated_time:new Date().toISOString(),updated_by:by}).eq('id',id);
  if(r.error){ _toast('更新失敗：'+r.error.message,'err'); return; }
  f.status=ns; f.updated_by=by; _toast(ns==='paid'?('已標記'+_finVerb(f)):'已還原為待處理'); renderFinancialRecords();
}
function _finStatusBadge(f){
  if(f.status==='paid')      return _badge('已付/收','green');
  if(f.status==='cancelled') return _badge('已流案','gray');
  if(f.status==='void')      return _badge('作廢','gray');
  return _badge('待處理','blue');
}
function updateFinTable(){
  var all=DB.financial_records;
  var rows=all.filter(_finApplyFilter);
  var total=Math.max(1,Math.ceil(rows.length/PAGE_SIZE)); if(finPage>total)finPage=total;
  var slice=rows.slice((finPage-1)*PAGE_SIZE,finPage*PAGE_SIZE);
  var tl={receivable:'應收（客戶）',receivable_provider:'應收（服務商退傭）',payable_provider:'應付服務商',payable_partner:'應付商務'};
  function _finTypeBadge(f){
    if(_finIsIncome(f)){
      // 舊格式相容：record_type='receivable' 但 counterparty 其實是服務商
      var label=(_finIsSpReceivable(f)||f.record_type==='receivable_provider')?'應收（服務商退傭）':(tl[f.record_type]||f.record_type);
      return _badge(label,'green');
    }
    if(f.record_type==='payable_partner') return _badge(tl[f.record_type]||f.record_type,'blue');
    return _badge(tl[f.record_type]||f.record_type,'amber');
  }
  var head='<thead><tr><th style="width:50px;">ID</th><th>專案</th><th style="width:80px;">專案類型</th><th>類別</th><th>對象</th><th style="text-align:right;">未稅</th><th style="text-align:right;">稅</th><th style="text-align:right;">金額</th><th style="width:70px;">狀態</th><th style="width:150px;">建立時間</th><th style="width:110px;">最後操作人</th></tr></thead>';
  // 輔助：判斷某列是否需要顯示外幣（優先採用該筆存下的鎖定匯率，修正 #3）
  function _rowFxInfo(f){ return _finRecFx(f); }
  // 輔助：建立含原始幣別的金額 td（未稅 / 稅 / 金額三欄共用）
  // origVal：結算當時存下的外幣原值（修正 #3）；金額為 0 時不顯示換算小字
  function _fxTd(twdVal,fx,bold,origVal){
    var style='text-align:right;'+(bold?'font-weight:700;font-variant-numeric:tabular-nums;':'');
    if(!fx) return '<td style="'+style+'">'+_money(twdVal)+'</td>';
    var numVal=Number(twdVal||0);
    if(numVal===0) return '<td style="'+style+'">0</td>';
    var orig=(origVal!=null)?Number(origVal):_fxOrigAmt(numVal,fx);
    var origStr=Number(orig).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
    return '<td style="'+style+'">'+fx.cur+' '+origStr+'<div style="font-size:10.5px;color:var(--text-dim);font-weight:400;margin-top:1px;">≈ TWD '+_money(numVal)+'</div></td>';
  }
  var body=slice.length? slice.map(function(f,idx){
    var computedStatus=_computeFinStatus(f);
    var fForBadge={status:computedStatus,record_type:f.record_type};
    var fx=_rowFxInfo(f);
    return '<tr>'+
      '<td class="id-cell">'+(rows.length-(finPage-1)*PAGE_SIZE-idx)+'</td>'+
      '<td>'+_esc(_projOf(f.project_id))+'</td>'+
      '<td>'+_finProjModeBadge(f)+'</td>'+
      '<td>'+_finTypeBadge(f)+'</td>'+
      '<td>'+_esc(_finCp(f))+'</td>'+
      _fxTd(f.amount_untaxed,fx,false,f.amount_untaxed_orig)+
      _fxTd(f.tax,fx,false,f.tax_orig)+
      _fxTd(f.amount,fx,true,f.amount_orig)+
      '<td>'+_finStatusBadge(fForBadge)+'</td>'+
      '<td style="white-space:nowrap;">'+_dt(f.created_time)+'</td>'+
      '<td style="white-space:nowrap;color:var(--text-mid);">'+_esc(f.updated_by||'—')+'</td>'+
    '</tr>';
  }).join(''):renderEmptyState(11);
  document.getElementById('fin-table').innerHTML=head+'<tbody>'+body+'</tbody>';
  document.getElementById('fin-pager').innerHTML='<span>共 '+rows.length+' 筆資料</span><div class="page-controls">'+buildPageBtns(finPage,total,'goFinPage')+'</div>';
}

var hpSupSearch='';
async function loadSuppliers(){
  var main=hpMain(); if(main) main.innerHTML='<div style="padding:60px;text-align:center;color:var(--text-dim);font-size:13px;">載入中…</div>';
  var r=await sb.from('suppliers').select('*').order('supplier_uid',{ascending:true});
  if(r.error){ if(main) main.innerHTML='<div style="padding:60px;text-align:center;color:#dc2626;">讀取失敗：'+hpEsc(r.error.message)+'</div>'; return; }
  DB.suppliers=r.data||[]; renderSuppliers();
}
function renderSuppliers(){
  var brandOpts=[], _seenBrand={}; (DB.suppliers||[]).forEach(function(s){ var n=s.supplier_name; if(n&&!_seenBrand[n]){ _seenBrand[n]=1; brandOpts.push({v:n,l:n}); } }); brandOpts.sort(function(a,b){ return String(a.l).localeCompare(String(b.l)); });
  hpMain().innerHTML=
    '<div class="page-header"><div class="breadcrumb"><span>貨盤管理</span><span class="sep">›</span><span>品牌方</span></div><h1>品牌方</h1>'+
      '<p>叫貨對接表：同一品牌方代理多品牌會分多列、共用同一 UID</p></div>'+
    '<div class="toolbar"><div class="toolbar-left">'+
      '<div class="search-box"><svg class="search-icon" width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="6"/><path d="M15 15l3 3" stroke-linecap="round"/></svg>'+
      '<input type="text" placeholder="搜尋品牌方 / 聯絡人 / 地區" value="'+hpEsc(hpSupSearch)+'" oninput="hpSupSearch=this.value;hpSupPage=1;renderSupResults()"></div>'+
      '　'+msDropdown('supBrand','全部品牌方',brandOpts,'hpSupFilterChange')+
    '</div><div class="toolbar-right" style="gap:8px;">'+
      '<button class="btn btn-secondary" onclick="openSupplierImportDialog()">⭳ 批量匯入</button>'+
      '<button class="btn btn-primary" onclick="openSupplierModal(null,true)">＋ 新增品牌方</button>'+
      '<button class="btn btn-secondary" onclick="exportSuppliers()" style="display:inline-flex;align-items:center;gap:6px;"><svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 3v10M6 9l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 15h12" stroke-linecap="round"/></svg>匯出 CSV</button>'+
    '</div></div>'+
    '<div id="sup-results"></div>';
  renderSupResults();
}
function renderSupResults(){
  var box=document.getElementById('sup-results'); if(!box) return;
  var rows=(DB.suppliers||[]).slice();
  var q=hpSupSearch.trim().toLowerCase();
  if(q) rows=rows.filter(function(s){ return (String(s.supplier_name||'')+String(s.contact_name||'')+String(s.region||'')).toLowerCase().indexOf(q)>=0; });
  var selBrands=msSel('supBrand');
  if(selBrands.length) rows=rows.filter(function(s){ return selBrands.indexOf(String(s.supplier_name))>=0; });
  var total=rows.length, pages=Math.max(1,Math.ceil(total/HP_PAGE));
  if(hpSupPage>pages) hpSupPage=pages; if(hpSupPage<1) hpSupPage=1;
  var pageRows=rows.slice((hpSupPage-1)*HP_PAGE, hpSupPage*HP_PAGE);
  var body=total? pageRows.map(function(s){
    return '<tr>'+
      '<td style="font-family:monospace;color:#374151;">'+hpEsc(s.supplier_uid)+'</td>'+
      '<td>'+hpEsc(s.supplier_name)+'</td>'+
      '<td>'+hpEsc(s.region)+'</td>'+
      '<td>'+hpEsc(s.contact_name)+'</td>'+
      '<td>'+hpEsc(s.phone)+'</td>'+
      '<td>'+hpEsc(s.email)+'</td>'+
      '<td>'+(s.brand_link?'<a href="'+hpEsc(s.brand_link)+'" target="_blank" rel="noopener" style="color:var(--accent,#2563eb);">連結 ↗</a>':'')+'</td>'+
      '<td>'+hpEsc(s.payment_currency)+'</td>'+
      '<td>'+hpEsc(s.payment_terms)+'</td>'+
      '<td style="color:#6b7280;white-space:nowrap;">'+hpEsc(s.updated_by||s.created_by||'')+'</td>'+
      '<td style="text-align:right;white-space:nowrap;">'+
        '<button class="btn btn-secondary" style="padding:3px 9px;font-size:12px;" onclick="openSupplierModal(\''+s.id+'\',false)">編輯</button> '+
        '<button class="btn btn-secondary" style="padding:3px 9px;font-size:12px;color:#dc2626;" onclick="deleteSupplier(\''+s.id+'\')">刪除</button>'+
      '</td></tr>';
  }).join('') : '<tr><td colspan="11" style="text-align:center;color:var(--text-dim);padding:40px;">尚無品牌方資料</td></tr>';
  box.innerHTML=
    '<div class="table-card"><div class="table-wrap"><table><thead><tr>'+
      '<th>UID</th><th>品牌方名稱</th><th>地區</th><th>聯絡人</th><th>電話</th><th>Email</th><th>品牌連結</th><th>收款幣別</th><th>付款/帳期</th><th>最後操作人</th><th style="text-align:right;">操作</th>'+
    '</tr></thead><tbody>'+body+'</tbody></table></div>'+
    '<div class="pagination"><span>共 '+total+' 筆　第 '+hpSupPage+' / '+pages+' 頁</span>'+hpPager(hpSupPage,pages,'hpGoSup')+'</div></div>';
}
function hpSupFilterChange(){ hpSupPage=1; renderSupResults(); }
function exportSuppliers(){
  var rows=(DB.suppliers||[]).slice();
  var q=hpSupSearch.trim().toLowerCase();
  if(q) rows=rows.filter(function(s){ return (String(s.supplier_name||'')+String(s.contact_name||'')+String(s.region||'')).toLowerCase().indexOf(q)>=0; });
  var sel=msSel('supBrand');
  if(sel.length) rows=rows.filter(function(s){ return sel.indexOf(String(s.supplier_name))>=0; });
  if(!rows.length){ _toast('目前篩選沒有資料可匯出','err'); return; }
  var header=['UID','品牌方名稱','負責地區/國家','聯絡人','職稱','電話','Email','通訊軟體','品牌連結','收款幣別','付款方式/帳期','最低起訂量MOQ','最低起訂金額','備註','最後操作人'];
  var data=rows.map(function(s){ return [s.supplier_uid,s.supplier_name,s.region,s.contact_name,s.contact_title,s.phone,s.email,s.messenger,s.brand_link,s.payment_currency,s.payment_terms,s.moq,s.min_order_amount,s.note,(s.updated_by||s.created_by||'')]; });
  _downloadCsv('品牌方',header,data);
}
var HP_SUP_FIELDS=[
  {k:'supplier_name',l:'品牌方名稱',req:true},
  {k:'region',l:'負責地區/國家',sel:HP_REGIONS},
  {k:'contact_name',l:'聯絡人',req:true},
  {k:'contact_title',l:'職稱'},
  {k:'phone',l:'電話'},
  {k:'email',l:'Email'},
  {k:'messenger',l:'通訊軟體 (LINE/WeChat/WhatsApp)'},
  {k:'brand_link',l:'品牌連結（官網／產品資訊，選填）',wide:true},
  {k:'payment_currency',l:'收款幣別',sel:HP_CUR},
  {k:'payment_terms',l:'付款方式 / 帳期'},
  {k:'moq',l:'最低起訂量 MOQ'},
  {k:'min_order_amount',l:'最低起訂金額',num:true},
  {k:'note',l:'備註'}
];
function openSupplierModal(id,isNew){
  var row={}; if(!isNew){ (DB.suppliers||[]).forEach(function(s){ if(String(s.id)===String(id)) row=s; }); }
  var html=HP_SUP_FIELDS.map(function(f){
    var reqMark=f.req?'<span style="color:#dc2626;margin-left:2px;">*</span>':'';
    var input;
    if(f.sel){ input='<select class="cm-input" id="sf-'+f.k+'"><option value="">請選擇</option>'+f.sel.map(function(o){return '<option value="'+o+'"'+((row[f.k]||'')===o?' selected':'')+'>'+o+'</option>';}).join('')+'</select>'; }
    else { input='<input class="cm-input" id="sf-'+f.k+'" value="'+hpEsc(row[f.k])+'">'; }
    return '<div class="cm-field"'+(f.wide?' style="grid-column:1/-1;"':'')+'><label>'+f.l+reqMark+'</label>'+input+'</div>';
  }).join('');
  var ov=document.createElement('div'); ov.id='sup-modal';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;align-items:center;justify-content:center;';
  ov.innerHTML='<div style="background:#fff;border-radius:14px;width:760px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.14);">'+
    '<div style="padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'+
      '<div style="font-family:Syne,sans-serif;font-weight:700;">'+(isNew?'新增品牌方':'編輯品牌方')+(row.supplier_uid?'　<span style="font-family:monospace;font-size:12px;color:var(--text-dim);">'+hpEsc(row.supplier_uid)+'</span>':'')+'</div>'+
      '<button onclick="document.getElementById(\'sup-modal\').remove()" style="background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:18px;">✕</button></div>'+
    '<div style="padding:22px 26px;overflow-y:auto;"><div class="cm-grid">'+html+'</div>'+
      '<div style="font-size:12px;color:var(--text-dim);margin-top:10px;">提示：每個品牌方建一列即可，UID 由系統依名稱自動配發。</div></div>'+
    '<div style="padding:0 24px;"><div id="sup-err" style="display:none;font-size:12.5px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:7px;padding:8px 12px;"></div></div>'+
    '<div style="padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;">'+
      '<button class="btn btn-secondary" onclick="document.getElementById(\'sup-modal\').remove()">取消</button>'+
      '<button class="btn btn-primary" onclick="saveSupplier(\''+(id||'')+'\')">保存</button></div></div>';
  document.body.appendChild(ov);
}
async function saveSupplier(id){
  var isNew=!id;
  var miss=[];
  HP_SUP_FIELDS.forEach(function(f){ if(f.req){ var el=document.getElementById('sf-'+f.k); if(el&&!el.value.trim()) miss.push(f.l); } });
  if(miss.length){ var e=document.getElementById('sup-err'); e.textContent='請填必填欄位：'+miss.join('、'); e.style.display='block'; return; }
  var payload={};
  HP_SUP_FIELDS.forEach(function(f){ var el=document.getElementById('sf-'+f.k); if(el){ var v=el.value.trim(); payload[f.k]=f.num?(v===''?null:Number(v)):(v||null); } });
  var name=payload.supplier_name;
  if(isNew){
    var exist=(DB.suppliers||[]).filter(function(s){return s.supplier_name===name;})[0];
    if(exist){ payload.supplier_uid=exist.supplier_uid; }
    else{ var max=0; (DB.suppliers||[]).forEach(function(s){ var m=/SUP-(\d+)/.exec(s.supplier_uid||''); if(m){ var n=parseInt(m[1],10); if(n>max)max=n; } }); payload.supplier_uid='SUP-'+String(max+1).padStart(3,'0'); }
    payload.created_time=new Date().toISOString(); payload.created_by=(currentUser?currentUser.full_name:'admin');
  }
  payload.updated_time=new Date().toISOString(); payload.updated_by=(currentUser?currentUser.full_name:'admin');
  var btn=document.querySelector('#sup-modal .btn-primary'); if(btn){ btn.disabled=true; btn.textContent='儲存中…'; }
  var res= isNew ? await sb.from('suppliers').insert([payload]) : await sb.from('suppliers').update(payload).eq('id',id);
  if(res.error){ var e=document.getElementById('sup-err'); e.textContent='儲存失敗：'+res.error.message; e.style.display='block'; if(btn){btn.disabled=false;btn.textContent='保存';} return; }
  document.getElementById('sup-modal').remove(); await loadSuppliers();
}
async function deleteSupplier(id){ if(!confirm('確定刪除此品牌方紀錄？')) return; var r=await sb.from('suppliers').delete().eq('id',id); if(r.error){ alert('刪除失敗：'+r.error.message); return; } await loadSuppliers(); }

/* ---------- 商品 products ---------- */
var hpFSearch='', HP_PAGE=25, hpProdPage=1, hpSupPage=1;
function hpPager(page,pages,fn){
  if(pages<=1) return '';
  var b='<div class="page-controls">';
  b+='<button class="page-btn" '+(page<=1?'disabled':'onclick="'+fn+'('+(page-1)+')"')+'>‹</button>';
  for(var i=1;i<=pages;i++){ b+='<button class="page-btn'+(i===page?' active':'')+'" onclick="'+fn+'('+i+')">'+i+'</button>'; }
  b+='<button class="page-btn" '+(page>=pages?'disabled':'onclick="'+fn+'('+(page+1)+')"')+'>›</button>';
  return b+'</div>';
}
function hpGoProd(n){ hpProdPage=n; hpRenderProdBody(); }
function hpGoSup(n){ hpSupPage=n; renderSupResults(); }
async function loadProducts(){
  var main=hpMain(); if(main) main.innerHTML='<div style="padding:60px;text-align:center;color:var(--text-dim);font-size:13px;">載入中…</div>';
  var r=await sb.from('products').select('*').order('sku',{ascending:true});
  if(r.error){ if(main) main.innerHTML='<div style="padding:60px;text-align:center;color:#dc2626;">讀取失敗：'+hpEsc(r.error.message)+'</div>'; return; }
  DB.products=r.data||[];
  if(!DB.suppliers){ var rs=await sb.from('suppliers').select('*'); DB.suppliers=rs.data||[]; }
  renderProducts();
}
function hpProductName(p){ return p.name_zh||p.name_en||p.name_ja||p.name_ko||'（未命名）'; }
function hpPickEntry(p){
  var cps=Array.isArray(p.country_prices)?p.country_prices:[];
  if(cps.length){
    var sel=(typeof msSel==='function')?msSel('hp-reg'):[];
    if(sel && sel.length===1){ var e=cps.filter(function(c){return c.region===sel[0];})[0]; if(e) return {e:e,multi:cps.length>1}; }
    return {e:cps[0],multi:cps.length>1};
  }
  return {e:{currency:p.currency,suggested_incl:p.suggested_price_incl,supply_excl:p.supply_price_excl,supply_incl:p.supply_price_incl}, multi:false};
}
function hpPriceCell(p){
  var cps=Array.isArray(p.country_prices)?p.country_prices:[];
  var sel=(typeof msSel==='function')?msSel('hp-reg'):[];
  function fmt(e){ if(!e) return ''; var v=(e.suggested_incl!=null?e.suggested_incl:(e.supply_incl!=null?e.supply_incl:e.supply_excl)); var r=hpRound(v,e.currency); return r!=null?hpEsc((e.currency||'')+' '+r):(e.currency?hpEsc(e.currency):''); }
  if(cps.length){
    if(sel && sel.length===1){ return fmt(cps.filter(function(c){return c.region===sel[0];})[0]); }
    if(cps.length===1) return fmt(cps[0]);
    return '<span style="color:#2563eb;">多國('+cps.length+')</span>';
  }
  var v=(p.suggested_price_incl!=null?p.suggested_price_incl:(p.supply_price_incl!=null?p.supply_price_incl:p.supply_price_excl));
  var r=hpRound(v,p.currency);
  return r!=null?hpEsc((p.currency||'')+' '+r):'';
}
function hpImgPreview(url){ if(!url) return;
  var ov=document.createElement('div'); ov.id='img-preview';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:24px;';
  ov.onclick=function(){ ov.remove(); };
  ov.innerHTML='<img src="'+hpEsc(url)+'" style="max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.4);">';
  document.body.appendChild(ov);
}
function hpFilteredProducts(){
  var rows=(DB.products||[]).slice();
  var fReg=msSel('hp-reg'), fCat=msSel('hp-cat'), fBrand=msSel('hp-brand');
  if(fReg.length) rows=rows.filter(function(p){ return (p.stock_regions||[]).some(function(r){return fReg.indexOf(r)>=0;}); });
  if(fCat.length) rows=rows.filter(function(p){ return fCat.indexOf(p.category)>=0; });
  if(fBrand.length) rows=rows.filter(function(p){ return fBrand.indexOf(p.brand)>=0; });
  var q=hpFSearch.trim().toLowerCase();
  if(q) rows=rows.filter(function(p){ return (String(p.sku||'')+String(p.name_zh||'')+String(p.name_en||'')+String(p.name_ja||'')+String(p.name_ko||'')).toLowerCase().indexOf(q)>=0; });
  return rows;
}
function hpRowsHtml(rows){
  return rows.length? rows.map(function(p){
    var chips=(p.stock_regions||[]).map(function(s){return '<span style="display:inline-block;padding:1px 7px;margin:1px;border-radius:10px;background:#eff4ff;color:#2563eb;font-size:11px;">'+hpEsc(s)+'</span>';}).join('');
    var thumb=p.photo_url? '<img src="'+hpEsc(p.photo_url)+'" onclick="hpImgPreview(this.src)" title="點擊放大" style="cursor:zoom-in;width:36px;height:36px;object-fit:cover;border-radius:6px;border:1px solid var(--border);">' : '<div style="width:36px;height:36px;border-radius:6px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;color:#c0c4cc;font-size:11px;">圖</div>';
    return '<tr>'+
      '<td style="text-align:center;"><input type="checkbox" class="hp-sel" value="'+p.id+'"></td>'+
      '<td>'+thumb+'</td>'+
      '<td style="font-family:monospace;color:#374151;white-space:nowrap;">'+hpEsc(p.sku)+'</td>'+
      '<td>'+hpEsc(hpProductName(p))+'</td>'+
      '<td style="color:#6b7280;">'+hpEsc(p.category)+'</td>'+
      '<td>'+hpEsc(p.brand)+'</td>'+
      '<td>'+chips+'</td>'+
      '<td style="text-align:right;white-space:nowrap;">'+hpPriceCell(p)+'</td>'+
      '<td style="color:#6b7280;white-space:nowrap;">'+hpEsc(p.updated_by||p.created_by||'')+'</td>'+
      '<td style="text-align:right;white-space:nowrap;">'+
        '<button class="btn btn-secondary" style="padding:3px 9px;font-size:12px;" onclick="openProductModal(\''+p.id+'\',false)">編輯</button> '+
        '<button class="btn btn-secondary" style="padding:3px 9px;font-size:12px;color:#dc2626;" onclick="deleteProduct(\''+p.id+'\')">刪除</button>'+
      '</td></tr>';
  }).join('') : '<tr><td colspan="10" style="text-align:center;color:var(--text-dim);padding:40px;">尚無商品，點右上「新增商品」或「批量匯入」</td></tr>';
}
function hpRenderProdBody(){
  var rows=hpFilteredProducts(); var total=rows.length; var pages=Math.max(1,Math.ceil(total/HP_PAGE));
  if(hpProdPage>pages) hpProdPage=pages; if(hpProdPage<1) hpProdPage=1;
  var pageRows=rows.slice((hpProdPage-1)*HP_PAGE, hpProdPage*HP_PAGE);
  var tb=document.getElementById('hp-tbody'); if(tb) tb.innerHTML=hpRowsHtml(pageRows);
  var c=document.getElementById('hp-count'); if(c) c.textContent='共 '+total+' 筆　第 '+hpProdPage+' / '+pages+' 頁';
  var pg=document.getElementById('hp-pager'); if(pg) pg.innerHTML=hpPager(hpProdPage,pages,'hpGoProd');
}
function hpApplyFilter(){ hpProdPage=1; hpRenderProdBody(); }

function hpToggleRegion(btn){
  var on=btn.getAttribute('data-on')==='1'; on=!on; btn.setAttribute('data-on',on?'1':'0');
  btn.style.background=on?'#eff4ff':'#fff'; btn.style.color=on?'#2563eb':'#6b7280'; btn.style.borderColor=on?'#bcd3f7':'#e5e7eb';

    suggested_price_incl:first.suggested_incl!=null?first.suggested_incl:null, supply_price_excl:first.supply_excl!=null?first.supply_excl:null, supply_price_incl:first.supply_incl!=null?first.supply_incl:null,
    hscode:hpVal('pf-hscode'), units_per_carton:hpNum('pf-units_per_carton'),
    box_l:hpNum('pf-box_l'), box_w:hpNum('pf-box_w'), box_h:hpNum('pf-box_h'),
    gross_weight:hpNum('pf-gross_weight'), shelf_life_months:hpNum('pf-shelf_life_months'),
    website:hpVal('pf-website'), photo_url:hpVal('pf-photo_url'), note:hpVal('pf-note'),
    updated_time:new Date().toISOString(), updated_by:(currentUser?currentUser.full_name:'admin')

/* ---------- 幣別換算（重用台銀 BOT_RATES） ---------- */
function hpToTWD(amt,cur){ if(cur==null||cur==='TWD') return amt; var s=(typeof BOT_RATES!=='undefined')?BOT_RATES[cur]:null; if(!s) return null; return amt*((s.buy+s.sell)/2); }
function hpConv(amt,from,to){ if(amt==null) return null; if(!to||from===to) return amt; var twd=hpToTWD(amt,from); if(twd==null) return null; if(to==='TWD') return twd; var s=(typeof BOT_RATES!=='undefined')?BOT_RATES[to]:null; if(!s) return null; return twd/((s.buy+s.sell)/2); }
var HP_ZERO_DEC=['TWD','JPY','KRW','VND','IDR','HUF','CLP'];  // 無小數幣別（顯示整數）
function hpRound(v,cur){ if(v==null||v==='') return null; var n=Number(v); if(isNaN(n)) return v; return (HP_ZERO_DEC.indexOf((cur||'').toUpperCase())>=0)?Math.round(n):Math.round(n*100)/100; }

function hpImpNum(v){ var s=hpImpVal(v); if(s==null) return null; var n=Number(String(s).replace(/,/g,'')); return isNaN(n)?null:n; }
function hpImpGet(row,sub){ var ks=Object.keys(row); for(var i=0;i<ks.length;i++){ if(ks[i].replace(/\s/g,'').indexOf(sub)>=0) return row[ks[i]]; } return ''; }
function hpPriceRowCp(row){
  function g(sub){ return hpImpGet(row,sub); }
  var region=hpImpVal(g('國家'))||hpImpVal(g('地區'));
  return {region:region||null, currency:hpImpVal(g('幣別'))||hpRegionCur(region)||null,
    suggested_incl:hpImpNum(g('建議售價')), supply_excl:hpImpNum(g('供貨價(未稅)')), supply_incl:hpImpNum(g('供貨價(含稅)')),
    local_code:hpImpVal(g('當地商品編號'))||null};
}
function hpMapImportRow(row, extCps){

  var category=hpImpVal(g('類別')), origin=hpImpVal(g('原產地'));
  var names={zh:hpImpVal(g('商品名稱_中')),en:hpImpVal(g('商品名稱_英')),ja:hpImpVal(g('商品名稱_日')),ko:hpImpVal(g('商品名稱_韓'))};

  var regionsRaw=hpImpVal(g('存貨地區')); var regions=regionsRaw?regionsRaw.split(/[、,，\/\s]+/).filter(Boolean):[];
  var cps, cpRaw=null;
  if(extCps){ cps=extCps.slice(); }   // 雙分頁：價格來自「各國售價」分頁
  else {
    cpRaw=hpImpVal(g('各國售價')); cps=[];
    if(cpRaw){
      cpRaw.split(/[;；\n]+/).forEach(function(seg){ seg=seg.trim(); if(!seg) return;
        var f=seg.split(/[｜|]/).map(function(x){return x.trim();});
        if(!f[0]&&!f[2]&&!f[3]&&!f[4]&&!f[5]) return;
        cps.push({region:f[0]||null, currency:f[1]||hpRegionCur(f[0])||null, suggested_incl:hpImpNum(f[2]), supply_excl:hpImpNum(f[3]), supply_incl:hpImpNum(f[4]), local_code:f[5]||null});
      });
    }
    if(!cps.length){ // 相容舊單欄
      var lcRaw=hpImpVal(g('當地商品編號')); var lcs=[];
      if(lcRaw){ lcRaw.split(/[;；\n]+/).forEach(function(part){ part=part.trim(); if(!part) return; var mm=part.split(/[:：]/); if(mm.length>=2) lcs.push({region:(mm[0].trim()||null),code:mm.slice(1).join(':').trim()}); else lcs.push({region:(regions[0]||null),code:part}); }); }
      var cur=hpImpVal(g('幣別')), s=hpImpNum(g('建議售價')), ex=hpImpNum(g('供貨價(未稅)')), ic=hpImpNum(g('供貨價(含稅)'));
      var r0=(lcs[0]&&lcs[0].region)||regions[0]||origin||null;
      if(cur||s!=null||ex!=null||ic!=null||lcs.length){
        cps=[{region:r0,currency:cur||hpRegionCur(r0),suggested_incl:s,supply_excl:ex,supply_incl:ic,local_code:(lcs[0]&&lcs[0].code)||null}];
        lcs.slice(1).forEach(function(c){ cps.push({region:c.region,currency:hpRegionCur(c.region),local_code:c.code}); });
      }
    }
  }
  var hasPrice=cps.some(function(c){ return c.suggested_incl!=null||c.supply_excl!=null||c.supply_incl!=null; });
  if(!category&&!origin&&!hasPrice&&!hasName&&!cpRaw) return null; // 空列
  var errs=[];
  if(!category) errs.push('缺類別'); if(!origin) errs.push('缺原產地'); if(!hasPrice) errs.push('缺價格'); if(!hasName) errs.push('缺商品名稱');
  var first=cps[0]||{};
  var codes=cps.filter(function(c){return c.local_code;}).map(function(c){return {region:c.region,code:c.local_code};});
  var allCodes=codes.map(function(c){return c.code;});
  var localCode=allCodes[0]||null; var photo=hpImpVal(g('照片'));
  var payload={
    stock_regions:regions, category:category, brand:hpImpVal(g('品牌名稱')), source_supplier:(hpImpVal(g('窗口'))||hpImpVal(g('來源'))), origin:origin,
    name_zh:names.zh,name_en:names.en,name_ja:names.ja,name_ko:names.ko,
    desc_zh:hpImpVal(g('產品敘述_中')),desc_en:hpImpVal(g('產品敘述_英')),desc_ja:hpImpVal(g('產品敘述_日')),desc_ko:hpImpVal(g('產品敘述_韓')),
    selling_zh:hpImpVal(g('產品賣點_中')),selling_en:hpImpVal(g('產品賣點_英')),selling_ja:hpImpVal(g('產品賣點_日')),selling_ko:hpImpVal(g('產品賣點_韓')),
    country_prices:cps,
    local_code:localCode, local_codes:codes,
    currency:first.currency||null, suggested_price_incl:(first.suggested_incl!=null?first.suggested_incl:null), supply_price_excl:(first.supply_excl!=null?first.supply_excl:null), supply_price_incl:(first.supply_incl!=null?first.supply_incl:null),
    hscode:hpImpVal(g('HSCODE')), units_per_carton:hpImpNum(g('箱入數')),
    box_l:hpImpNum(g('箱長')), box_w:hpImpNum(g('箱寬')), box_h:hpImpNum(g('箱高')),
    gross_weight:hpImpNum(g('單箱毛重')), shelf_life_months:hpImpNum(g('有效期限')),
    website:hpImpVal(g('網站連結')), note:hpImpVal(g('備註')),
    photo_url:(photo&&/^https?:\/\//i.test(photo))?photo:null
  };
  var match=null;
  (DB.products||[]).forEach(function(p){
    if(match) return;
    if(allCodes.length && (allCodes.indexOf(p.local_code)>=0 || (Array.isArray(p.local_codes)&&p.local_codes.some(function(c){return allCodes.indexOf(c.code)>=0;})))) match=p;
    else if(!allCodes.length && p.brand===payload.brand && p.name_zh===payload.name_zh && p.origin===origin && payload.name_zh) match=p;
  });
  return {payload:payload, errors:errs, mode:(match?'update':'new'), id:(match?match.id:null), name:(names.zh||names.en||names.ja||names.ko||'')};
}

function hpImpParse(input){
  var file=input.files&&input.files[0]; if(!file) return;
  var status=document.getElementById('hp-imp-status'); if(status) status.textContent='解析中…';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var pSheet=wb.Sheets['商品資料']||wb.Sheets['上傳範本'];
      var cpSheet=wb.Sheets['各國售價'];
      hpImpRows=[];
      if(pSheet && cpSheet){ // 雙分頁：商品資料 + 各國售價（以 商品代號 / 商品名稱(中) 對應）
        var prices=XLSX.utils.sheet_to_json(cpSheet,{defval:''});
        var pmap={};
        prices.forEach(function(r){ var k=hpImpVal(hpImpGet(r,'商品代號'))||hpImpVal(hpImpGet(r,'商品名稱')); if(!k) return; var cp=hpPriceRowCp(r); if(cp.region||cp.currency||cp.suggested_incl!=null||cp.supply_excl!=null||cp.supply_incl!=null||cp.local_code){ (pmap[k]=pmap[k]||[]).push(cp); } });
        var prods=XLSX.utils.sheet_to_json(pSheet,{defval:''});
        prods.forEach(function(row,idx){ var k=hpImpVal(hpImpGet(row,'商品代號'))||hpImpVal(hpImpGet(row,'商品名稱_中'))||hpImpVal(hpImpGet(row,'商品名稱')); var m=hpMapImportRow(row, pmap[k]||[]); if(m){ m.rowNum=idx+2; hpImpRows.push(m); } });
      } else { // 單分頁（相容舊格式）
        var sh=pSheet||wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(sh,{defval:''});
        rows.forEach(function(row,idx){ var m=hpMapImportRow(row); if(m){ m.rowNum=idx+2; hpImpRows.push(m); } });
      }
      hpRenderImp();
    }catch(err){ if(status) status.textContent='解析失敗：'+err.message; }
  };
  reader.readAsArrayBuffer(file);
}
function hpRenderImp(){

  }).join('');

}
var hpSkuCount={};
function hpBatchSku(origin,category){
  var prefix='GC-'+hpOriginCode(origin)+'-'+(HP_CAT_CODE[category]||'GEN')+'-';
  if(hpSkuCount[prefix]==null){ var max=0; (DB.products||[]).forEach(function(p){ if(p.sku&&p.sku.indexOf(prefix)===0){ var n=parseInt(p.sku.slice(prefix.length),10); if(!isNaN(n)&&n>max)max=n; } }); hpSkuCount[prefix]=max; }
  hpSkuCount[prefix]++; return prefix+String(hpSkuCount[prefix]).padStart(3,'0');
}
async function hpImpRun(){
  var ok=hpImpRows.filter(function(r){return !r.errors.length;});
  if(!ok.length) return;
  hpSkuCount={};
  var btn=document.getElementById('hp-imp-run'); if(btn){ btn.disabled=true; btn.textContent='匯入中…'; }
  var who=(currentUser?currentUser.full_name:'admin'), now=new Date().toISOString();
  var done=0, fail=0;
  for(var i=0;i<ok.length;i++){
    var r=ok[i]; var pl=r.payload; pl.updated_time=now; pl.updated_by=who;
    var res;
    if(r.mode==='new'){ pl.sku=hpBatchSku(pl.origin,pl.category); pl.created_time=now; pl.created_by=who; res=await sb.from('products').insert([pl]); }
    else {
      // 更新既有商品：匯入檔沒帶有效圖片網址時，不要覆蓋原有圖片（photo_url / photos 保持不動）
      if(!pl.photo_url){ delete pl.photo_url; }
      delete pl.photos;
      res=await sb.from('products').update(pl).eq('id',r.id);
    }
    if(res.error){ fail++; } else { done++; }
    var status=document.getElementById('hp-imp-status'); if(status) status.textContent='匯入中… '+(i+1)+'/'+ok.length;
  }
  document.getElementById('imp-modal').remove();
  alert('匯入完成：成功 '+done+' 筆'+(fail?('，失敗 '+fail+' 筆'):''));
  await loadProducts();
}

async function hpExpThumb(url){
  try{
    var resp=await fetch(url); if(!resp.ok) throw new Error('fetch '+resp.status);
    var blob=await resp.blob();
    var bmp=null; try{ bmp=await createImageBitmap(blob); }catch(e){ bmp=null; }
    if(bmp){
      var max=160, w=bmp.width||160, h=bmp.height||160, s=Math.min(1,max/Math.max(w,h));
      var cw=Math.max(1,Math.round(w*s)), ch=Math.max(1,Math.round(h*s));
      var cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
      var ctx=cv.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,cw,ch); ctx.drawImage(bmp,0,0,cw,ch);
      var out=await new Promise(function(res){ cv.toBlob(function(b){res(b);},'image/jpeg',0.82); });
      if(out){ return {buffer:await out.arrayBuffer(), extension:'jpeg'}; }
    }
    // 後備：縮圖失敗就用原圖
    var ext=(url.split('?')[0].split('.').pop()||'').toLowerCase(); ext=(ext==='png')?'png':(ext==='gif'?'gif':'jpeg');
    return {buffer:await blob.arrayBuffer(), extension:ext};
  }catch(e){ return null; }
}
// 填一個分頁：country='__FIRST__' 取各商品第一國；否則只列有該國價格者。回傳 {skipped,used}
async function hpExpFillSheet(wb, ws, rows, country, lang, margin, targetCur, imgCache, st, fx){
  var heads=HP_EXP_HEADERS[lang]||HP_EXP_HEADERS.zh;
  ws.columns=heads.map(function(h,i){ return {header:h, width:(i===1?11:(i===0||i===11?16:(i>=4&&i<=6?34:14)))}; });
  ws.getRow(1).font={bold:true}; ws.getRow(1).height=22;
  var skipped=0, used=0;
  for(var i=0;i<rows.length;i++){
    var p=rows[i];
    var ents=hpEntriesOf(p), e;
    if(country && country!=='__FIRST__'){ e=ents.filter(function(x){return x.region===country;})[0]; if(!e){ skipped++; continue; } }
    else { e=ents[0]||{}; }
    var name=p['name_'+lang]||p.name_zh||p.name_en||p.name_ja||p.name_ko||'';
    var desc=p['desc_'+lang]||''; var selling=p['selling_'+lang]||'';
    var srcCur=e.currency||''; var base=(e.supply_incl!=null?e.supply_incl:e.supply_excl);
    var cur=srcCur; var gc=(base!=null)?base*(1+margin/100):null;
    var sugg=(e.suggested_incl!=null?e.suggested_incl:null);
    var doConv=(targetCur && targetCur!=='__ORIG__' && srcCur && targetCur!==srcCur);
    if(doConv){
      if(gc!=null){ var cv=hpConvFx(gc,srcCur,targetCur,fx); if(cv!=null){ gc=cv; cur=targetCur; } }
      if(sugg!=null){ var sc=hpConvFx(sugg,srcCur,targetCur,fx); if(sc!=null){ sugg=sc; cur=targetCur; } }
    }
    gc=hpRound(gc,cur); sugg=hpRound(sugg,cur);
    var lc=e.local_code||'';
    var regions=(p.stock_regions||[]).join('、');
    var row=ws.addRow([p.sku||'','',p.category||'',p.brand||'',name,desc,selling,cur,(sugg==null?'':sugg),(gc==null?'':gc),(p.shelf_life_months==null?'':p.shelf_life_months),p.origin||'',regions,lc]);
    row.height=48; row.alignment={vertical:'middle',wrapText:true}; used++;
    if(p.photo_url){
      try{
        if(st) st.textContent='處理圖片…';
        var im=imgCache[p.photo_url];
        if(im===undefined){ im=await hpExpThumb(p.photo_url); imgCache[p.photo_url]=im; }  // 縮圖快取（失敗存 null，不重試）
        if(im){
          var imgId=wb.addImage({buffer:im.buffer, extension:im.extension});
          ws.addImage(imgId,{tl:{col:1,row:row.number-1},ext:{width:60,height:60}});
        }
      }catch(e){ /* 圖片抓取失敗則略過 */ }
    }
  }
  return {skipped:skipped, used:used};
}
async function hpExportRun(){
  var lang=document.getElementById('exp-lang').value;
  var sel=(typeof msSel==='function')?msSel('exp-country').slice():[];
  var margin=Number(document.getElementById('exp-margin').value)||0, targetCur=document.getElementById('exp-cur').value;
  // 讀取本次使用的匯率（1 外幣 = ? TWD），供換算與記錄
  var fx={}; Array.prototype.forEach.call(document.querySelectorAll('#exp-fx .fx-rate'),function(inp){ var v=parseFloat(inp.value); if(!isNaN(v)&&v>0) fx[inp.getAttribute('data-cur')]=v; });
  var fxUsed=(targetCur&&targetCur!=='__ORIG__'&&Object.keys(fx).length)?fx:null;
  var rows=hpFilteredProducts();
  var st=document.getElementById('exp-status'); var btn=document.getElementById('exp-run'); if(btn){btn.disabled=true;btn.textContent='匯出中…';}
  try{
    var wb=new ExcelJS.Workbook(); var imgCache={}; var cnt=0; var emptyCountries=[];
    if(sel.length){
      for(var s=0;s<sel.length;s++){
        var c=sel[s];
        if(st) st.textContent='產生分頁：'+c+'（'+(s+1)+'/'+sel.length+'）…';
        var r1=await hpExpFillSheet(wb, wb.addWorksheet(hpSheetName(c,wb)), rows, c, lang, margin, targetCur, imgCache, st, fx);
        cnt+=r1.used; if(r1.used===0) emptyCountries.push(c);
      }
    } else {
      var r0=await hpExpFillSheet(wb, wb.addWorksheet('貨盤表'), rows, '__FIRST__', lang, margin, targetCur, imgCache, st, fx);
      cnt=r0.used;
    }
    var country=sel.length?sel.join('、'):'__FIRST__';
    var out=await wb.xlsx.writeBuffer();
    var note=((document.getElementById('exp-note')||{}).value||'').trim();
    var stamp=new Date(); var dstr=stamp.toISOString().slice(0,10);
    var dlName='貨盤表_'+dstr+'.xlsx';
    var blob=new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    // 上傳存檔到 Storage，供「匯出紀錄」日後預覽/下載。路徑用純 ASCII（中文檔名會被 Storage 拒絕）
    var fileUrl=null, fileName='pallet_'+stamp.getTime()+'.xlsx', upErr='';
    try{
      if(st) st.textContent='儲存匯出檔…';
      var upath='exports/'+fileName;
      var upx=await sb.storage.from('export-files').upload(upath,blob,{upsert:true,contentType:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',cacheControl:'3600'});
      if(upx.error){ upErr=upx.error.message||'上傳失敗'; }
      else { fileUrl=sb.storage.from('export-files').getPublicUrl(upath).data.publicUrl; }
    }catch(e){ upErr=(e&&e.message)||String(e); }
    // 寫入匯出紀錄
    try{
      var rec={ created_time:stamp.toISOString(), created_by:(currentUser?currentUser.full_name:'admin'),
        note:note||null, lang:lang, country:country, target_currency:targetCur, margin:margin,
        product_count:cnt, file_name:dlName, file_url:fileUrl, fx_rates:(fxUsed?JSON.stringify(fxUsed):null) };
      var ins=await sb.from('export_logs').insert([rec]);
      if(ins&&ins.error&&/fx_rates/.test(ins.error.message||'')){ delete rec.fx_rates; await sb.from('export_logs').insert([rec]); }
    }catch(e){}
    // 瀏覽器下載
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=dlName; a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); },4000);
    if(emptyCountries.length) alert('以下出貨國家沒有任何商品有價格，該分頁為空：'+emptyCountries.join('、'));
    if(upErr) alert('檔案已下載到本機，但存到雲端失敗，匯出紀錄會顯示「未存檔」、無法再次下載/預覽。\n原因：'+upErr+'\n\n請確認已在 Supabase 執行建立 export-files bucket 的 SQL（貨盤管理_匯出紀錄_建表.sql）。');
    document.getElementById('exp-modal').remove();
    if(typeof currentPage!=='undefined' && currentPage==='export_logs'){ loadExportLogs(); }
  }catch(err){ if(st) st.textContent='匯出失敗：'+err.message; if(btn){btn.disabled=false;btn.textContent='匯出 Excel';} }
}

function hpImgKey(fname){ var d=fname.lastIndexOf('.'); var base=(d>=0?fname.slice(0,d):fname); return base.replace(/_\d+$/,'').trim(); }
function hpNorm(s){ return String(s==null?'':s).replace(/[\s_\-\/\\:*?"<>|()（）＊*]/g,'').toLowerCase(); }
function hpFindByKey(key){ var nk=hpNorm(key);
  return (DB.products||[]).filter(function(p){
    return p.sku===key || p.local_code===key
      || (Array.isArray(p.local_codes)&&p.local_codes.some(function(c){return c.code===key;}))
      || (p.sku&&hpNorm(p.sku)===nk) || (p.name_zh&&hpNorm(p.name_zh)===nk) || (p.name_en&&hpNorm(p.name_en)===nk);
  })[0]||null;
}
async function hpImgEntries(files){
  var out=[];
  for(var i=0;i<files.length;i++){ var f=files[i];
    if(/\.zip$/i.test(f.name)){
      if(typeof JSZip==='undefined'){ continue; }
      var zip=await JSZip.loadAsync(f); var ns=Object.keys(zip.files);
      for(var j=0;j<ns.length;j++){ var zf=zip.files[ns[j]]; if(zf.dir) continue; var bn=ns[j].split('/').pop(); if(/^__MACOSX/.test(ns[j])||/^\./.test(bn)) continue; if(!/\.(png|jpe?g|gif|webp)$/i.test(bn)) continue; var blob=await zf.async('blob'); out.push({name:bn,blob:blob}); }
    } else if(/\.(png|jpe?g|gif|webp)$/i.test(f.name)){ out.push({name:f.name,blob:f}); }
  }
  return out;
}
async function hpBatchImgRun(){
  var input=document.getElementById('hp-img-files'); var files=input&&input.files?Array.prototype.slice.call(input.files):[];
  if(!files.length){ alert('請先選擇圖片或 ZIP'); return; }
  var st=document.getElementById('hp-img-status'); var btn=document.querySelector('#img-modal .btn-primary'); if(btn){btn.disabled=true;btn.textContent='處理中…';}
  if(st) st.textContent='讀取檔案…';
  var entries=await hpImgEntries(files);
  if(!entries.length){ if(st) st.textContent='找不到圖片檔（支援 png/jpg/gif/webp，或含這些圖的 ZIP）'; if(btn){btn.disabled=false;btn.textContent='開始上傳';} return; }
  var acc={}, log=[], matched=0, unmatched=0;
  for(var i=0;i<entries.length;i++){
    var e=entries[i]; var key=hpImgKey(e.name); var p=hpFindByKey(key);
    if(st) st.textContent='上傳中… '+(i+1)+'/'+entries.length;
    if(!p){ unmatched++; log.push('<div style="color:#dc2626;">'+hpEsc(e.name)+' → 找不到對應商品（'+hpEsc(key)+'）</div>'); continue; }
    var path='p_'+(p.sku||p.id)+'_'+Date.now()+'_'+e.name.replace(/[^\w.\-]/g,'_');
    var up=await sb.storage.from('product-images').upload(path,e.blob,{upsert:true,cacheControl:'3600'});
    if(up.error){ log.push('<div style="color:#dc2626;">'+hpEsc(e.name)+' → 上傳失敗：'+hpEsc(up.error.message)+'</div>'); continue; }
    var url=sb.storage.from('product-images').getPublicUrl(path).data.publicUrl;
    // 重新配圖採「覆蓋」：本次配到的商品，圖片以這次上傳的為準（第一張主圖、其餘附圖），覆蓋原有圖片
    var a=acc[p.id]||(acc[p.id]={photo_url:null, photos:[]});
    if(!a.photo_url) a.photo_url=url; else a.photos.push(url);
    matched++; log.push('<div style="color:#16a34a;">'+hpEsc(e.name)+' → '+hpEsc(p.sku||'')+' '+hpEsc(hpProductName(p))+'</div>');
  }
  var who=(currentUser?currentUser.full_name:'admin'), now=new Date().toISOString();
  for(var id in acc){ await sb.from('products').update({photo_url:acc[id].photo_url, photos:acc[id].photos, updated_time:now, updated_by:who}).eq('id',id); }
  document.getElementById('hp-img-result').innerHTML='<div style="max-height:200px;overflow:auto;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px;">'+log.join('')+'</div>';
  if(st) st.textContent='完成：成功配圖 '+matched+' 張，未對應 '+unmatched+' 張。';
  if(btn){btn.disabled=false;btn.textContent='完成';}
  await loadProducts();
}

/* ---------- 品牌方 批量匯入 ---------- */
var hpSupImpRows=[];
function hpSupMapRow(row){
  function g(sub){ return hpImpGet(row,sub); }
  var name=hpImpVal(g('品牌方名稱')) || hpImpVal(g('名稱'));
  if(!name && !hpImpVal(g('聯絡人')) && !hpImpVal(g('Email'))) return null;
  var errs=[]; if(!name) errs.push('缺品牌方名稱');
  var payload={ supplier_name:name, region:hpImpVal(g('負責地區')), contact_name:hpImpVal(g('聯絡人')),
    contact_title:hpImpVal(g('職稱')), phone:hpImpVal(g('電話')), email:hpImpVal(g('Email')),
    messenger:hpImpVal(g('通訊軟體')), brand_link:hpImpVal(g('品牌連結')), payment_currency:hpImpVal(g('收款幣別')), payment_terms:hpImpVal(g('付款方式')),
    moq:hpImpVal(g('最低起訂量')), min_order_amount:hpImpNum(g('最低起訂金額')), note:hpImpVal(g('備註')) };
  var match=(DB.suppliers||[]).filter(function(s){return s.supplier_name===name;})[0];
  return {payload:payload, errors:errs, mode:(match?'update':'new'), id:(match?match.id:null), name:name||''};
}
function openSupplierImportDialog(){
  if(typeof XLSX==='undefined'){ alert('Excel 函式庫尚未載入，請重新整理頁面再試。'); return; }
  hpSupImpRows=[];
  var ov=document.createElement('div'); ov.id='supimp-modal';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;align-items:center;justify-content:center;';
  ov.innerHTML='<div style="background:#fff;border-radius:14px;width:780px;max-width:94vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.14);">'+
    '<div style="padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">'+
      '<div style="font-family:Syne,sans-serif;font-weight:700;">批量匯入品牌方</div>'+
      '<button onclick="document.getElementById(\'supimp-modal\').remove()" style="background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:18px;">✕</button></div>'+
    '<div style="padding:20px 24px;overflow-y:auto;flex:1;">'+
      '<div style="font-size:13px;color:var(--text-mid);margin-bottom:12px;line-height:1.7;">上傳範本的<b>「品牌方資料」分頁</b>（.xlsx）。依<b>品牌方名稱</b>比對：已存在→更新、不存在→新增並配發 UID。</div>'+
      '<input type="file" accept=".xlsx" id="hp-supimp-file" onchange="hpSupImpParse(this)">'+
      '<div id="hp-supimp-status" style="font-size:12px;color:var(--text-dim);margin-top:8px;"></div>'+
      '<div id="hp-supimp-result" style="margin-top:14px;"></div>'+
    '</div>'+
    '<div style="padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;">'+
      '<button class="btn btn-secondary" onclick="document.getElementById(\'supimp-modal\').remove()">取消</button>'+
      '<button class="btn btn-primary" id="hp-supimp-run" disabled onclick="hpSupImpRun()">匯入</button></div></div>';
  document.body.appendChild(ov);
}
function hpSupImpParse(input){
  var file=input.files&&input.files[0]; if(!file) return;
  var status=document.getElementById('hp-supimp-status'); if(status) status.textContent='解析中…';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      var sh=wb.Sheets['品牌方資料']||wb.Sheets['供應商資料']||wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(sh,{defval:'',range:1});
      hpSupImpRows=[];
      rows.forEach(function(row,idx){ var m=hpSupMapRow(row); if(m){ m.rowNum=idx+3; hpSupImpRows.push(m); } });
      hpRenderSupImp();
    }catch(err){ if(status) status.textContent='解析失敗：'+err.message; }
  };
  reader.readAsArrayBuffer(file);
}
function hpRenderSupImp(){
  var ok=hpSupImpRows.filter(function(r){return !r.errors.length;});
  var bad=hpSupImpRows.filter(function(r){return r.errors.length;});
  var nNew=ok.filter(function(r){return r.mode==='new';}).length, nUpd=ok.filter(function(r){return r.mode==='update';}).length;
  var st=document.getElementById('hp-supimp-status'); if(st) st.textContent='共 '+hpSupImpRows.length+' 列：新增 '+nNew+'、更新 '+nUpd+'、錯誤 '+bad.length;
  var body=hpSupImpRows.map(function(r){
    var s=r.errors.length?'<span style="color:#dc2626;">錯誤</span>':(r.mode==='new'?'<span style="color:#16a34a;">新增</span>':'<span style="color:#2563eb;">更新</span>');
    return '<tr style="border-top:1px solid #f1f2f4;"><td style="padding:5px 8px;color:#9ca3af;">'+r.rowNum+'</td><td style="padding:5px 8px;">'+hpEsc(r.name)+'</td><td style="padding:5px 8px;">'+hpEsc(r.payload.contact_name)+'</td><td style="padding:5px 8px;">'+s+'</td><td style="padding:5px 8px;color:#dc2626;font-size:12px;">'+hpEsc(r.errors.join('、'))+'</td></tr>';
  }).join('');
  document.getElementById('hp-supimp-result').innerHTML='<div style="border:1px solid var(--border);border-radius:8px;overflow:auto;max-height:300px;"><table style="width:100%;border-collapse:collapse;font-size:12.5px;"><thead><tr style="background:#f9fafb;color:#6b7280;text-align:left;"><th style="padding:6px 8px;">列</th><th style="padding:6px 8px;">品牌方</th><th style="padding:6px 8px;">聯絡人</th><th style="padding:6px 8px;">狀態</th><th style="padding:6px 8px;">訊息</th></tr></thead><tbody>'+body+'</tbody></table></div>';
  var btn=document.getElementById('hp-supimp-run'); if(btn) btn.disabled=(ok.length===0);
}
async function hpSupImpRun(){
  var ok=hpSupImpRows.filter(function(r){return !r.errors.length;}); if(!ok.length) return;
  var btn=document.getElementById('hp-supimp-run'); if(btn){ btn.disabled=true; btn.textContent='匯入中…'; }
  var who=(currentUser?currentUser.full_name:'admin'), now=new Date().toISOString();
  var nameUid={}, maxUid=0;
  (DB.suppliers||[]).forEach(function(s){ if(s.supplier_name) nameUid[s.supplier_name]=s.supplier_uid; var m=/SUP-(\d+)/.exec(s.supplier_uid||''); if(m){ var n=parseInt(m[1],10); if(n>maxUid)maxUid=n; } });
  var done=0, fail=0;
  for(var i=0;i<ok.length;i++){
    var r=ok[i]; var pl=r.payload; pl.updated_time=now; pl.updated_by=who; var res;
    if(r.mode==='new'){
      if(nameUid[pl.supplier_name]) pl.supplier_uid=nameUid[pl.supplier_name];
      else { maxUid++; pl.supplier_uid='SUP-'+String(maxUid).padStart(3,'0'); nameUid[pl.supplier_name]=pl.supplier_uid; }
      pl.created_time=now; pl.created_by=who; res=await sb.from('suppliers').insert([pl]);
    } else { res=await sb.from('suppliers').update(pl).eq('id',r.id); }
    if(res.error){ fail++; } else { done++; }
    var st=document.getElementById('hp-supimp-status'); if(st) st.textContent='匯入中… '+(i+1)+'/'+ok.length;
  }
  document.getElementById('supimp-modal').remove();
  alert('品牌方匯入完成：成功 '+done+' 筆'+(fail?('，失敗 '+fail+' 筆'):''));
  await loadSuppliers();
}
</script>
