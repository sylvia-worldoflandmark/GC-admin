// 台銀即期匯率快照（TWD / 1 外幣單位；buy=即期買入、sell=即期賣出）。可於畫面手動更新。
var BOT_RATE_SNAPSHOT_DATE='2026-07-01';
var BOT_RATES={
  USD:{buy:31.830,sell:31.930}, EUR:{buy:36.180,sell:36.580}, JPY:{buy:0.19460,sell:0.19860},
  CNY:{buy:4.662,sell:4.712},   HKD:{buy:4.034,sell:4.094},   GBP:{buy:42.020,sell:42.420},
  AUD:{buy:21.790,sell:21.990}, CAD:{buy:22.320,sell:22.520}, SGD:{buy:24.550,sell:24.730},
  CHF:{buy:39.290,sell:39.540}, NZD:{buy:17.900,sell:18.100}, THB:{buy:0.94130,sell:0.98130}
};
var CUR_LIST=['TWD','USD','JPY','CNY'];
var CUR_NAME={ TWD:'新台幣', USD:'美元', JPY:'日圓', CNY:'人民幣' };
function _rate4(n){ return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:5}); }
function _quoteCfgKey(){ return 'gc_quote_'+(WIZ&&WIZ.id?WIZ.id:'new'); }
function _quoteCfg(){
  // 預設幣別：居間模式以服務商收款幣別為主（取最多數），主理人模式以客戶付款幣別為主
  var defCur='TWD';
  var _inter=WIZ&&WIZ.project&&WIZ.project.cooperation_mode==='intermediary';
  if(_inter){
    var _spCurMap={};
    (WIZ&&WIZ.matches||[]).forEach(function(m){ var sp=_find(DB.service_providers,m.service_provider_id); var c=(sp&&sp.payment_currency)||'TWD'; _spCurMap[c]=(_spCurMap[c]||0)+1; });
    var _spCurs=Object.keys(_spCurMap);
    if(_spCurs.length) defCur=_spCurs.sort(function(a,b){ return _spCurMap[b]-_spCurMap[a]; })[0];
  } else if(WIZ&&WIZ.project&&WIZ.project.customer_id){
    var cust=_find(DB.customers,WIZ.project.customer_id);
    if(cust&&cust.payment_currency) defCur=cust.payment_currency;
  }
  var def={ currency:defCur, buy:0, sell:0, srcRates:{}, _touched:false, _cur_locked:false, _cur_pinned:false, overrides:{}, show_orig_cur:true };
  if(defCur!=='TWD'&&BOT_RATES[defCur]){ def.buy=BOT_RATES[defCur].buy; def.sell=BOT_RATES[defCur].sell; }
  try{
    var s=localStorage.getItem(_quoteCfgKey());
    if(s){
      var o=JSON.parse(s)||{}; o.overrides=o.overrides||{}; o.srcRates=o.srcRates||{};
      var merged=Object.assign(def,o);
      // 舊資料相容：以前用 _cur_locked 同時表示「鎖匯率」與「釘選幣別」，現在拆成
      // _cur_pinned（使用者已選定顯示幣別，不自動還原）與 _cur_locked（匯率凍結）
      if(merged._cur_locked&&merged._cur_pinned===undefined) merged._cur_pinned=true;
      // 未釘選顯示幣別時：幣別還原為預設（客戶／服務商幣別）；匯率不自動重置，僅首次補台銀快照
      if(!merged._cur_pinned){
        merged.currency=defCur;
        if(!merged.buy||!merged.sell){
          if(defCur!=='TWD'&&BOT_RATES[defCur]){ merged.buy=BOT_RATES[defCur].buy; merged.sell=BOT_RATES[defCur].sell; }
        }
      }
      return merged;
    }
  }catch(e){}
  return def;
}
function _saveQuoteCfg(cfg){ try{ localStorage.setItem(_quoteCfgKey(), JSON.stringify(cfg)); }catch(e){} }
function _qToggleOrigCur(el){ var cfg=_quoteCfg(); cfg.show_orig_cur=!!el.checked; _saveQuoteCfg(cfg); _wizRender(); }
// 套用匯率＝即期買入＋賣出之平均（TWD / 1 外幣）。買賣值缺漏時以台銀快照補上，避免換算失效。
function _quoteRate(cfg){ cfg=cfg||_quoteCfg(); if(cfg.currency==='TWD') return 1; return _cfgRate(cfg.currency,cfg); }
// 台幣金額換算為目前報價幣別
function _fxConv(twd,cfg){ cfg=cfg||_quoteCfg(); if(cfg.currency==='TWD') return Math.ceil(Number(twd||0)); var r=_quoteRate(cfg); if(cfg.currency==='JPY') return Math.ceil(Number(twd||0)/r); return Math.round(Number(twd||0)/r*100)/100; }
// 跨幣別換算：將 amt（fromCur 計價）換算到報價顯示幣別（toCfg.currency），以 TWD 為中間值
function _fxConvCross(amt,fromCur,toCfg){
  amt=Number(amt||0); toCfg=toCfg||_quoteCfg(); fromCur=fromCur||'TWD';
  if(fromCur===(toCfg.currency||'TWD')) return amt; // 同幣別，原值返回
  // Step 1: fromCur → TWD
  var inTWD=(fromCur==='TWD')?amt:(function(){ var s=BOT_RATES[fromCur]; var r=s?(s.buy+s.sell)/2:1; return amt*r; })();
  // Step 2: TWD → 顯示幣別
  return _fxConv(inTWD,toCfg);
}
// 取得某來源外幣對台幣的匯率（TWD/1 單位）：優先採用 cfg 的鎖定/設定值（srcRates → 顯示幣別 buy/sell），否則台銀即時快照
function _cfgRate(cur,cfg){
  if(!cur||cur==='TWD') return 1;
  if(cfg&&cfg.srcRates&&cfg.srcRates[cur]){ var x=cfg.srcRates[cur]; var b=Number(x.buy||0),s=Number(x.sell||0); if(b>0&&s>0) return (b+s)/2; }
  if(cfg&&cfg.currency===cur){ var b2=Number(cfg.buy||0),s2=Number(cfg.sell||0); if(b2>0&&s2>0) return (b2+s2)/2; }
  var snap=BOT_RATES[cur]; return snap?(snap.buy+snap.sell)/2:1;
}
// 將 amt（fromCur 計價）換算成 TWD。cfg 省略時，於建案精靈內自動採用該專案的報價設定（含鎖定匯率）；其他頁面則用台銀即時。
function _itemToTwd(amt,fromCur,cfg){
  amt=Number(amt||0); fromCur=fromCur||'TWD';
  if(fromCur==='TWD') return Math.round(amt); // TWD 永遠取整數
  if(cfg===undefined){ cfg=(typeof currentPage!=='undefined'&&currentPage==='projects'&&WIZ&&WIZ.id)?_quoteCfg():null; }
  return Math.round(amt*_cfgRate(fromCur,cfg)); // 外幣換算後取整數
}
function _fxFmt(v,cfg){ cfg=cfg||_quoteCfg(); if(cfg.currency==='TWD') return 'TWD '+_money(v); if(cfg.currency==='JPY') return 'JPY '+Number(v||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); return cfg.currency+' '+Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
// 外幣備注：TWD 金額換算為指定幣別，回傳「≈ USD 5,000」span；同幣別或無法換算回傳 ''
function _fxNote(twd,cur,customRate){
  if(!cur||cur==='TWD'||!twd) return '';
  var avg=customRate||(BOT_RATES[cur]?(BOT_RATES[cur].buy+BOT_RATES[cur].sell)/2:0);
  if(!avg) return '';
  var val=(cur==='JPY')?Math.ceil(twd/avg):Math.round(twd/avg*100)/100;
  var fmt=(cur==='JPY')?Number(val).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}):Number(val).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return '<span style="font-size:11px;color:var(--text-dim);margin-left:5px;">≈ '+cur+' '+fmt+'</span>';
}
// 取得項目幣別：優先從服務項目庫查詢，次而用服務商的收款幣別
function _itemCurrency(it,spId){
  if(it&&it.service_id){ var svc=_find(DB.service_provider_services,it.service_id); if(svc&&svc.currency) return svc.currency; }
  var sp=_find(DB.service_providers,spId); return (sp&&sp.payment_currency)||'TWD';
}
// 報價單金額儲存格：依匯率換算後格式化顯示（金額不可在文件上覆寫，請回「洽談合作」步驟調整項目金額）
function _amtCell(key,twd,cfg){ cfg=cfg||_quoteCfg(); return _fxFmt(_fxConv(twd,cfg),cfg); }
// 報價明細卡片金額儲存格：同上，永遠顯示換算值
function _qAmtCell(key,twd,cfg){ cfg=cfg||_quoteCfg(); return _fxFmt(_fxConv(twd,cfg),cfg); }
function _docRateLine(){
  var cfg=_quoteCfg(); if(cfg.currency==='TWD') return '';
  return '<div style="margin:14px 0 2px;font-size:11.5px;color:#555;line-height:1.7;">匯率（台灣銀行即期）：1 '+cfg.currency+' ＝ <b>'+_rate4(_quoteRate(cfg))+'</b> TWD（買入 '+_rate4(cfg.buy)+' ＋ 賣出 '+_rate4(cfg.sell)+' 平均）　·　表列金額單位：'+cfg.currency+'</div>';
}
function _parseBotCsv(txt){
  // 台銀 flcsv 每列格式：幣別,本行買入,現金,即期,遠期10天…(共10),本行賣出,現金,即期,遠期…
  // 即期買入 = 第 4 欄(index 3)；即期賣出 = 第 14 欄(index 13)
  var out={};
  String(txt||'').split(/\r?\n/).forEach(function(line){
    var c=line.split(','); if(c.length<14) return;
    var code=(c[0]||'').trim().toUpperCase();
    if(!/^[A-Z]{3}$/.test(code)) return; // 跳過表頭與非三碼代碼
    var buy=parseFloat(c[3]);   // 即期買入
    var sell=parseFloat(c[13]); // 即期賣出
    if(!isNaN(buy)&&!isNaN(sell)&&buy>0&&sell>0) out[code]={buy:buy,sell:sell};
  });
  return out;
}
async function _wizFetchRate(){
  var fxCurs=_wizFxCurs(); if(!fxCurs.length){ _toast('無外幣項目，免匯率'); return; }
  _toast('正在向台灣銀行取得即期匯率…');
  var botUrl='https://rate.bot.com.tw/xrt/flcsv/0/day';
  // 依序嘗試多個 CORS proxy，任一成功即停止（json:true 者回傳 {contents:CSV}）
  var proxies=[
    {u:'https://api.allorigins.win/raw?url='+encodeURIComponent(botUrl), json:false},
    {u:'https://corsproxy.io/?url='+encodeURIComponent(botUrl), json:false},
    {u:'https://api.codetabs.com/v1/proxy/?quest='+encodeURIComponent(botUrl), json:false},
    {u:'https://api.allorigins.win/get?url='+encodeURIComponent(botUrl), json:true},
    {u:'https://thingproxy.freeboard.io/fetch/'+botUrl, json:false}
  ];
  var rates={};
  for(var i=0;i<proxies.length;i++){
    try{
      var res=await fetch(proxies[i].u,{cache:'no-store',signal:AbortSignal.timeout(8000)});
      if(!res.ok) continue;
      var txt=await res.text();
      if(proxies[i].json){ try{ txt=(JSON.parse(txt)||{}).contents||''; }catch(e){ continue; } }
      txt=txt.replace(/^﻿/,''); // 去除 UTF-8 BOM
      if(txt.trim().charAt(0)==='<') continue; // proxy 回傳 HTML 錯誤頁
      var parsed=_parseBotCsv(txt);
      if(Object.keys(parsed).length>3){ rates=parsed; break; } // 成功拿到有效 CSV
    }catch(e){ continue; }
  }
  var cfg=_quoteCfg(); cfg.srcRates=cfg.srcRates||{}; var got=[];
  fxCurs.forEach(function(cur){
    if(rates[cur]){ cfg.srcRates[cur]={buy:rates[cur].buy,sell:rates[cur].sell}; if(cur===cfg.currency){ cfg.buy=rates[cur].buy; cfg.sell=rates[cur].sell; } got.push(cur); }
  });
  if(got.length){
    cfg._touched=true; cfg.rate_date=new Date().toISOString().slice(0,10);
    _saveQuoteCfg(cfg);
    _wizRender();
    _toast('已更新台銀即期匯率（'+got.join('、')+'・'+cfg.rate_date+'）');
  } else {
    // 所有 proxy 失敗；引導用戶手動輸入
    _toast('無法自動抓取台銀匯率（proxy 皆失敗），請手動輸入買入／賣出匯率','err');
  }
}
// 本專案需要換匯的外幣清單（報價顯示幣別若為外幣，加上所有服務商項目的外幣）
function _wizFxCurs(){

// 主理人模式：GC 收費與分潤試算（估算，實際於收款結案時按規則結算）
function _wizPrincipalPreview(p){
  var order=0; // 即時由各項目換算後加總（下方迴圈填入），不依賴可能過時的欄位
  var total=0;
  var taxRate=Number(p.tax_rate!=null?p.tax_rate:5);
  var cfg=_quoteCfg();
  var custCur=(function(){ var c=p.customer_id?_find(DB.customers,p.customer_id):null; return c&&c.payment_currency||'TWD'; })();
  var custRate=custCur!=='TWD'&&cfg.currency===custCur?_quoteRate(cfg):null;
  var sHd=function(lbl,bg,clr){
    return '<div style="display:flex;align-items:center;padding:7px 12px;background:'+bg+';border-radius:8px;margin:12px 0 8px;">'
      +'<span style="font-size:12px;font-weight:600;color:'+clr+';">'+lbl+'</span></div>';
  };
  var row=function(l,v,note,strong){
    return '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;'+(strong?'border-top:1.5px solid var(--border);margin-top:3px;':'border-bottom:0.5px solid var(--border);')+'">'
      +'<span style="font-size:13px;color:'+(strong?'var(--text)':'var(--text-mid)')+';">'+l+'</span>'
      +'<span style="font-size:'+(strong?'14px':'13px')+';'+(strong?'font-weight:700;':'')+'font-variant-numeric:tabular-nums;color:var(--text);">'+v+(note||'')+'</span>'
      +'</div>';
  };
  // 服務商底價 + 收款小計（逐 match，即時由項目換算成 TWD，不依賴可能過時的 base_total/profit_untaxed 欄位）
  var baseCost=0, orderLive=0, matchProfit={};
  var spRows='';
  (WIZ.matches||[]).forEach(function(m){
    var mSub=0, mBase=0;
    (WIZ.itemsByMatch[m.id]||[]).forEach(function(it){
      var cur=_itemCurrency(it,m.service_provider_id);
      mSub+=_itemToTwd(Number(it.amount_untaxed||0),cur);
      mBase+=_itemToTwd(Number(it.base_price||0),cur);
    });
    orderLive+=mSub; baseCost+=mBase; matchProfit[m.id]=Math.max(0,mSub-mBase);
    var sp=_find(DB.service_providers,m.service_provider_id);
    var spCur=(sp&&sp.payment_currency)||'TWD';
    // SP 底價以原始幣別顯示，TWD 為備注
    var spCfg={currency:spCur};
    var costDisplay=spCur!=='TWD'?_fxFmt(_fxConv(mBase,spCfg),spCfg):'TWD '+_money(mBase);
    var costTwdNote=spCur!=='TWD'?'<span style="font-size:11px;color:var(--text-dim);margin-left:5px;">≈ TWD '+_money(mBase)+'</span>':'';
    spRows+=row(_esc(_spName(m.service_provider_id)), costDisplay, costTwdNote, false);
  });
  order=Math.round(orderLive); total=order+Math.round(order*taxRate/100);
  var profit=Math.max(0,order-baseCost);
  // 業務分潤（逐 match）
  var orderTypes=WIZ.matchOrderTypes||{};
  var totalPartner=0;
  var bpRows='';
  var hasMultiMatch=(WIZ.matches||[]).length>1;
  (WIZ.matches||[]).forEach(function(m){
    var mt=orderTypes[m.id]||{orderType:'first_order',bpId:p.business_partner_id};
    if(!mt.bpId) return;
    var rule=_ruleRow(mt.orderType);
    var mProfit=Number(matchProfit[m.id]||0);
    var partnerPct=mt.bpId&&rule?Number(rule.partner_percent||0):0;
    var partnerAmt=Math.round(mProfit*partnerPct/100);
    totalPartner+=partnerAmt;
    var bpCur=(function(){ var b=_find(DB.business_partners,mt.bpId); return b&&b.payment_currency||'TWD'; })();
    var bpDisplay=bpCur!=='TWD'?_fxFmt(_fxConv(partnerAmt,{currency:bpCur}),{currency:bpCur}):'TWD '+_money(partnerAmt);
    var bpNote=bpCur!=='TWD'?'<span style="font-size:11px;color:var(--text-dim);margin-left:5px;">≈ TWD '+_money(partnerAmt)+'</span>':'';
    var label=_esc(_bpName(mt.bpId))
      +'<span style="font-size:10.5px;background:#f1f5f9;border-radius:4px;padding:1px 5px;margin-left:5px;">'+_esc(mt.orderType==='first_order'?'首單':'回購')+' '+partnerPct+'%</span>'
      +(hasMultiMatch?'<span style="font-size:11px;color:var(--text-dim);margin-left:4px;">'+_esc(_spName(m.service_provider_id))+'</span>':'');
    bpRows+=row(label, bpDisplay, bpNote, false);
  });
  var gcAmt=Math.max(0,profit-totalPartner);
  var hasBp=!!bpRows;
  var html='';
  // 收款
  html+=sHd('收款　GC 向客戶收取','#f0fdf4','#15803d');
  html+='<div style="padding:0 2px;">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:8px;border-bottom:0.5px solid var(--border);">'
    +'<span style="font-size:12.5px;color:var(--text-mid);">'+_esc(_custName(p.customer_id))+'</span>'
    +'<div style="text-align:right;">'
    +'<div style="font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.2;">'+_fxFmt(_fxConv(total,cfg),cfg)+'</div>'
    +'<div style="font-size:11px;color:var(--text-dim);">含稅 '+taxRate+'%'+(custCur!=='TWD'?'　'+_fxNote(total,custCur,custRate):'')+'</div>'
    +'</div></div>'
    +row('未稅小計', _fxFmt(_fxConv(order,cfg),cfg), custCur!=='TWD'&&custCur!==cfg.currency?_fxNote(order,custCur,custRate):'', false)
    +row('稅額（'+taxRate+'%）', _fxFmt(_fxConv(total-order,cfg),cfg), '', false)
    +'</div>';
  // 付款
  html+=sHd('付款　GC 付服務商底價','#fff7ed','#b45309');
  html+='<div style="padding:0 2px;">'+spRows+row('合計', 'TWD '+_money(baseCost), '', true)+'</div>';
  // 業務分潤
  if(hasBp){
    html+=sHd('業務分潤','#eff6ff','#2563eb');
    html+='<div style="padding:0 2px;">'+bpRows;
    if(hasMultiMatch) html+=row('分潤合計', 'TWD '+_money(totalPartner), '', true);
    html+='</div>';
  }
  // GC 利潤
  html+='<div style="margin-top:14px;padding:12px 14px;border-radius:8px;background:#f8fafc;border:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;">'
    +'<div><div style="font-size:12.5px;color:var(--text-mid);">GC 利潤</div>'
    +'<div style="font-size:11px;color:var(--text-dim);">毛利'+(hasBp?' − 業務分潤':'，直客全拿')+'</div></div>'
    +'<span style="font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;">TWD '+_money(gcAmt)+'</span>'
    +'</div>';
  return _wizCard(
    _wizSecTitle('主理人模式｜金流試算')+html+
    '<div style="font-size:11.5px;color:var(--text-dim);margin-top:12px;line-height:1.6;">首單'+(_ruleRow('first_order')?Number(_ruleRow('first_order').partner_percent||0)+'%':'65%')+'／回購'+(_ruleRow('repurchase')?Number(_ruleRow('repurchase').partner_percent||0)+'%':'35%')+'（分潤規則可至財務管理 → 分潤規則調整）；實際分潤於「收款結案」結算時產生。</div>'
  );
}

var _paySeq=0;
function _payParse(str){
  if(!str) return null;
  try{ var o=JSON.parse(str); if(o&&o.v===1&&Array.isArray(o.items)) return o; }catch(e){}
  return null;
}
function _paySerialize(items){
  var text=items.map(function(it){
    var amt=it.amount?'TWD '+_money(it.amount):'金額待定';
    return it.label+'：'+amt+'（'+(it.date||'日期待定')+'，'+it.dir+'款）';
  }).join('；\n');
  return JSON.stringify({v:1,text:text,items:items});
}
// 顯示一列；amount 永遠是 TWD，輸入欄依 cfg 換算顯示（可手動覆蓋）

// 金額變更 → 反算 %（雙向聯動：填金額自動算比例）
function _payRecalcPct(id){
  var pEl=document.getElementById('pay-pct-'+id);
  var aEl=document.getElementById('pay-amt-'+id);
  if(!aEl) return;
  var amt=parseFloat(aEl.value);
  if(!isNaN(amt)&&amt>=0&&pEl){
    var displayTotal=_payDisplayTotal();
    pEl.value=displayTotal>0?Math.round(amt/displayTotal*10000)/100:''; // 精確到小數兩位
  }
  _payUpdateTotal();
}
// pct 變更 → 自動換算報價幣別金額填入 input（可再手動覆蓋）
function _payRecalcAmt(id,total_twd){
  var pEl=document.getElementById('pay-pct-'+id);
  var aEl=document.getElementById('pay-amt-'+id);
  if(!pEl||!aEl) return;
  var pct=parseFloat(pEl.value);
  if(!isNaN(pct)&&pct>=0){
    var displayTotal=_payDisplayTotal();
    aEl.value=Math.round(displayTotal*pct/100*100)/100;
  }
  _payUpdateTotal();
}
// 取得收款排程用的「含稅總額（顯示幣別）」：居間模式用退傭含稅；主理人用 total_untaxed+tax
function _payDisplayTotal(){
  var cfg=_quoteCfg();
  var taxRate=Number(WIZ&&WIZ.project&&WIZ.project.tax_rate!=null?WIZ.project.tax_rate:5);
  var inter=WIZ&&WIZ.project&&WIZ.project.cooperation_mode==='intermediary';
  if(inter){
    var _rebTwd=_wizInterRebateTotal();
    var _rebGross=_rebTwd+Math.round(_rebTwd*taxRate/100);
    return Math.round(_fxConv(_rebGross,cfg)*100)/100;
  } else {
    var subTwd=Number(WIZ&&WIZ.project?WIZ.project.total_untaxed||0:0);
    var totalTwdCalc=subTwd+Math.round(subTwd*taxRate/100);
    return Math.round(_fxConv(totalTwdCalc,cfg)*100)/100;
  }
}
// 共用：計算「排程收款合計 vs 含稅應收」差額。無排程表時回傳 null。
function _payDiffCheck(){
  var tbody=document.getElementById('pay-tbody'); if(!tbody) return null;
  var target=_payDisplayTotal();
  var sum=0;
  tbody.querySelectorAll('tr[id^="pay-row-"]').forEach(function(row){
    var id=row.id.replace('pay-row-','');
    var dirEl=document.getElementById('pay-dir-'+id);
    var dir=dirEl?dirEl.value:(row.dataset.dir||'收');
    if(dir!=='收') return; // 只計算「收」款
    var amtEl=document.getElementById('pay-amt-'+id);
    var amt=amtEl?parseFloat(amtEl.value)||0:parseFloat(row.dataset.amt)||0;
    sum+=amt;
  });
  sum=Math.round(sum*100)/100;
  var diff=Math.round((sum-target)*100)/100;
  return { sum:sum, target:target, diff:diff, ok:Math.abs(diff)<0.005 };
}
// 即時更新收款排程小計 footer（收款項加總 vs 含稅總額）＋連動「標記已送合約」按鈕
function _payUpdateTotal(){
  var chk=_payDiffCheck();
  // 防呆：排程金額與含稅應收不吻合時，停用「標記已送合約」按鈕
  var mb=document.getElementById('wiz-marksent-btn');
  if(mb){
    if(chk && !chk.ok){ mb.disabled=true; mb.style.opacity='0.5'; mb.style.cursor='not-allowed'; mb.title='收款排程金額與含稅應收不一致，請先調整至吻合再送出'; }
    else { mb.disabled=false; mb.style.opacity=''; mb.style.cursor=''; mb.title=''; }
  }
  var footer=document.getElementById('pay-footer'); if(!footer||!chk) return;
  var cfg=_quoteCfg();
  var target=chk.target, sum=chk.sum, diff=chk.diff, ok=chk.ok;
  var fmt=function(n){ return _fxFmt(n,cfg); };  // 依幣別決定小數位（USD/EUR 兩位、TWD/JPY 整數）
  footer.style.cssText='margin-top:10px;padding:10px 14px;border-radius:8px;background:'+(ok?'#f0fdf4':'#fef2f2')+';border:1px solid '+(ok?'#bbf7d0':'#fecaca')+';';
  footer.innerHTML='<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;font-size:12.5px;">'+
    '<span style="color:var(--text-mid);">排程收款合計 <b style="color:var(--text);font-variant-numeric:tabular-nums;">'+fmt(sum)+'</b></span>'+
    '<span style="color:var(--text-mid);">含稅應收 <b style="color:var(--text);font-variant-numeric:tabular-nums;">'+fmt(target)+'</b></span>'+
    (ok
      ?'<span style="color:#16a34a;font-weight:600;display:flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 10l5 5 7-8" stroke-linecap="round" stroke-linejoin="round"/></svg> 金額吻合</span>'
      :'<span style="color:#dc2626;font-weight:600;">差額 '+fmt(diff)+'（'+(diff>0?'多收':'少收')+' '+fmt(Math.abs(diff))+'）</span>'
    )+
  '</div>';
}
// 報價幣別金額 → TWD（儲存用）
function _payCfgToTwd(amt_cfg,cfg){
  if(!cfg||cfg.currency==='TWD') return Math.ceil(Number(amt_cfg)||0);
  var rate=_quoteRate(cfg); if(!rate) return 0;
  // 保留兩位小數，避免「外幣→整數TWD→外幣」的精度損失（例：USD 720 → 22777 TWD → 719.99 USD）
  return Math.round(Number(amt_cfg||0)*rate*100)/100;
}

function _paySetTemplate(tpl){
  var cfg=_quoteCfg();
  // 使用與 footer target 完全相同的公式，確保 template 金額可以精確加總
  var dt=_payDisplayTotal();
  var dispAmts=[];
  if(tpl==='full'){
    dispAmts=[dt];
  } else if(tpl==='deposit'){
    var d1=Math.round(dt*0.3*100)/100;
    dispAmts=[d1, Math.round((dt-d1)*100)/100];
  } else if(tpl==='3phase'){
    var p1=Math.round(dt*0.34*100)/100;
    var p2=Math.round(dt*0.33*100)/100;
    dispAmts=[p1, p2, Math.round((dt-p1-p2)*100)/100]; // 最後一筆用 remainder，確保精確加總
  }
  var labels={'full':['全額'],'deposit':['訂金','尾款'],'3phase':['第一期','第二期','第三期']}[tpl]||[];

// 讀取 DOM → 回傳 items（amount 反算回 TWD 儲存）

  var r=await _wizSaveProject(patch);

async function _wizMarkSent(){
  // 防呆：收款排程「收」款金額必須與報價含稅應收一致，否則不允許送出合約
  if(!_isLocked()){
    var _chk=_payDiffCheck();
    if(_chk && !_chk.ok){
      var _c=_quoteCfg();
      alert('收款排程金額與報價含稅總計不一致，無法標記送出合約。\n\n排程收款合計：'+_fxFmt(_chk.sum,_c)+'\n含稅應收　　：'+_fxFmt(_chk.target,_c)+'\n差額　　　　：'+(_chk.diff>0?'多收 ':'少收 ')+_fxFmt(Math.abs(_chk.diff),_c)+'\n\n請調整收款排程金額使其與含稅應收一致後再送出（可用上方「快速套用」一鍵帶入）。');
      return;
    }
  }
  // 先把排程同步到記憶體（確保即使之前有重渲染也不丟資料）
  // _isLocked() 為 true 時 DOM 無 input，_paySync() 會全部讀到 0，不能蓋掉記憶體
  var payItems=_isLocked()?[]:_paySync(); var payStr=payItems&&payItems.length?_paySerialize(payItems):WIZ.project.payment_terms||null;
  // 快照當下匯率設定存入 DB，防止後續匯率波動影響已出去的報價金額
  var cfg=_quoteCfg();
  cfg._cur_locked=true; cfg._locked_at=new Date().toISOString();
  _saveQuoteCfg(cfg);
  // 一次性同時存排程 + 狀態 + 匯率快照，避免兩次 save 之間狀態不一致
  var sq=document.getElementById('wiz-showqty');
  var r=await _wizSaveProject({ status:_wizBump('contract_sent'), quote_settings:cfg, payment_terms:payStr, show_qty_on_quote:sq?sq.checked:true });
  if(r){ _toast('已標記送出合約，匯率已鎖定'); _wizRender(); }
}
// 若目前在 Step 3（報價/合約）且未鎖定，先把 DOM 排程序列化回 patch，確保存入 DB
function _payPatchIfStep3(){
  if(!WIZ||WIZ.step!==3||_isLocked()) return {};
  var tbody=document.getElementById('pay-tbody');
  if(!tbody||!tbody.querySelector('input[id^="pay-lbl-"]')) return {};
  var items=_paySync();
  if(!items||!items.length) return {};
  return { payment_terms:_paySerialize(items) };
}
async function _wizLockRate(){
  if(!WIZ.id){ _toast('請先儲存專案再鎖定匯率','err'); return; }
  var cfg=_quoteCfg();
  var curs=_wizFxCurs();
  if(!curs.length){ _toast('無外幣項目，免鎖定匯率'); return; }
  cfg.srcRates=cfg.srcRates||{};
  // 把每個外幣目前畫面（或已設定／台銀快照）的買入賣出凍結進 srcRates
  curs.forEach(function(cur){
    var bI=document.getElementById('wiz-fx-buy-'+cur), sI=document.getElementById('wiz-fx-sell-'+cur);
    var b=bI?parseFloat(bI.value):NaN, s=sI?parseFloat(sI.value):NaN;
    var ex=_wizCfgRateOf(cfg,cur);
    cfg.srcRates[cur]={ buy:isNaN(b)?Number(ex.buy||0):b, sell:isNaN(s)?Number(ex.sell||0):s };
  });
  if(cfg.currency!=='TWD'&&cfg.srcRates[cfg.currency]){ cfg.buy=cfg.srcRates[cfg.currency].buy; cfg.sell=cfg.srcRates[cfg.currency].sell; }
  cfg._cur_locked=true; cfg._cur_pinned=true; cfg._locked_at=new Date().toISOString();
  if(!cfg.rate_date) cfg.rate_date=new Date().toISOString().slice(0,10);
  _saveQuoteCfg(cfg);
  var patch=Object.assign({ quote_settings:cfg },_payPatchIfStep3());
  var r=await _wizSaveProject(patch);
  if(r){ _toast('匯率已鎖定（'+curs.join('、')+'）'); _wizRender(); }
}
// 步驟 3「儲存設定」：同時保存收款排程 + 報價設定（稅率、數量顯示、幣別匯率）
async function _wizSaveStep3(){
  // 1. 收款排程
  var payItems=_isLocked()?[]:_paySync();
  var payStr=payItems&&payItems.length?_paySerialize(payItems):(WIZ.project.payment_terms||null);
  // 2. 稅率
  var taxEl=document.getElementById('wiz-tax');
  var taxRate=taxEl&&taxEl.value!==''?Number(taxEl.value):Number(WIZ.project.tax_rate!=null?WIZ.project.tax_rate:5);
  // 3. 數量顯示
  var sq=document.getElementById('wiz-showqty');
  var showQty=sq?sq.checked:(WIZ.project.show_qty_on_quote!==false);
  // 4. 匯率設定：顯示幣別非 TWD，或有任何外幣來源匯率設定時，皆需存 quote_settings
  var cfg=_quoteCfg();
  var qsPatch=(cfg.currency!=='TWD'||(cfg.srcRates&&Object.keys(cfg.srcRates).length))?{ quote_settings:cfg }:{};
  var patch=Object.assign({ payment_terms:payStr, tax_rate:isNaN(taxRate)?5:taxRate, show_qty_on_quote:showQty }, qsPatch);
  var r=await _wizSaveProject(patch);
  if(r) _toast('步驟 3 報價設定已儲存');
}

  if(!WIZ.id) return '<div style="color:var(--text-dim);padding:20px 0;">請先儲存專案後再設定付款協議。</div>'+_wizFooter();

  var spts=WIZ.spPaymentTerms||[];
  var parsed=_payParse(p.payment_terms);
  var clientInsts=(parsed&&parsed.items?parsed.items:[]).filter(function(it){ return it.dir==='收'; });
  if(!clientInsts.length) clientInsts=[{id:1,label:'全額',pct:100}];

  var unlockOpts=clientInsts.map(function(ci,ciIdx){
    return '<option value="'+ci.id+'">收到客戶第'+(ciIdx+1)+'期（'+_esc(ci.label||'款項')+'）</option>';
  }).join('');

  var hasAll=WIZ.matches.length>0&&WIZ.matches.every(function(m){

  });

  var spBlocks=WIZ.matches.length===0
    ?'<div style="font-size:13px;color:var(--text-dim);padding:16px 0;">尚無媒合服務商，請先完成步驟 2。</div>'
    :WIZ.matches.map(function(m){
      var spId=m.service_provider_id;
      var sp=_find(DB.service_providers,spId);
      // terms 先取，以便在 SP 資料缺失時以 term.currency 作 fallback
      var terms=spts.filter(function(t){ return t.service_provider_id===spId; });
      var spCur=(sp&&sp.payment_currency)||(terms.length&&terms[0].currency)||'TWD';
      var isTwd=(spCur==='TWD');
      var bdgSt=isTwd?'background:#f1f5f9;color:#475569;border:0.5px solid #cbd5e1;':'background:#dbeafe;color:#1d4ed8;border:0.5px solid #93c5fd;';
      var badge='<span style="font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;vertical-align:middle;'+bdgSt+'">'+spCur+'</span>';
      var total=terms.reduce(function(s,t){ return s+Number(t.amount||0); },0);
      var totalHtml=total>0?(isTwd?'NT$ '+_money(total):spCur+' '+total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})):'—';

async function _sptReload(){
  if(!WIZ.id) return;
  var r=await sb.from('sp_payment_terms').select('*').eq('project_id',WIZ.id).order('service_provider_id').order('installment_index');
  WIZ.spPaymentTerms=r.data||[];
}

// 將目前 DOM 中的欄位值寫回 WIZ.spPaymentTerms 記憶體（重繪前呼叫，避免使用者輸入消失）
function _sptFlush(){
  if(!WIZ||!WIZ.spPaymentTerms) return;
  WIZ.spPaymentTerms.forEach(function(t){
    var lbl=document.getElementById('spt-lbl-'+t.id);
    var amt=document.getElementById('spt-amt-'+t.id);
    var notes=document.getElementById('spt-notes-'+t.id);
    var unlock=document.getElementById('spt-unlock-'+t.id);
    if(lbl) t.label=lbl.value;
    if(amt) t.amount=parseFloat(amt.value)||0;
    if(notes) t.notes=notes.value;
    if(unlock) t.unlock_client_installment_id=parseInt(unlock.value);
  });
}

// 即時更新 SP header 的協議總計與差額（oninput 觸發，不重繪整頁）
function _sptLiveUpdate(spId){
  var spts=(WIZ.spPaymentTerms||[]).filter(function(t){ return t.service_provider_id==spId; });
  var sp=_find(DB.service_providers,spId);
  // 與 _wizStep9Princ 相同的 fallback：SP 資料缺失時用 term.currency
  var spCur=(sp&&sp.payment_currency)||(spts.length&&spts[0].currency)||'TWD';
  var isTwd=(spCur==='TWD');
  var total=spts.reduce(function(s,t){
    var el=document.getElementById('spt-amt-'+t.id);
    return s+(el?parseFloat(el.value)||0:Number(t.amount||0));
  },0);
  // 更新總計顯示
  var totalEl=document.getElementById('spt-total-'+spId);
  if(totalEl){
    totalEl.textContent=total>0?(isTwd?'NT$ '+_money(total):spCur+' '+total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})):'—';
  }
  // 更新差額徽章
  var diffEl=document.getElementById('spt-diff-'+spId);
  if(!diffEl) return;
  var refTwd=parseFloat(diffEl.getAttribute('data-ref-twd'))||0;
  if(!refTwd) return;
  var botRate=(typeof BOT_RATES!=='undefined'&&BOT_RATES&&BOT_RATES[spCur])?(BOT_RATES[spCur].buy+BOT_RATES[spCur].sell)/2:0;
  var isMatch, diffStr;
  if(isTwd){
    isMatch=Math.abs(total-refTwd)<1;
    var lDir=total>refTwd?'多付':'少付';
    diffStr=isMatch?'✓ 吻合':(lDir+' NT$ '+_money(Math.abs(total-refTwd)));
  } else {
    var refFx=botRate?Math.round(refTwd/botRate*100)/100:0;
    isMatch=Math.abs(total-refFx)<0.02;
    var lDir=total>refFx?'多付':'少付';
    diffStr=isMatch?'✓ 吻合':(lDir+' '+spCur+' '+Math.abs(total-refFx).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}));
  }
  diffEl.textContent=diffStr;
  diffEl.style.background=isMatch?'#f0fdf4':'#fef2f2';
  diffEl.style.color=isMatch?'#16a34a':'#dc2626';
  diffEl.style.borderColor=isMatch?'#bbf7d0':'#fecaca';
}

function _sptAddTerm(spId,currency){
  _sptFlush(); // 先把目前 DOM 值存回記憶體，避免重繪後消失
  var existing=WIZ.spPaymentTerms.filter(function(t){ return t.service_provider_id===spId; });
  var nextIdx=existing.length+1;
  var parsed=_payParse(WIZ.project.payment_terms);
  var clientInsts=(parsed&&parsed.items?parsed.items:[]).filter(function(it){ return it.dir==='收'; });
  var defaultUnlock=clientInsts.length?clientInsts[0].id:1;
  var tempId=-(Date.now()+Math.floor(Math.random()*1000));
  WIZ.spPaymentTerms.push({ id:tempId, project_id:WIZ.id, service_provider_id:spId, installment_index:nextIdx, label:'款項'+nextIdx, amount:0, currency:currency||'TWD', notes:'', unlock_client_installment_id:defaultUnlock, _isNew:true });
  _wizRender();
}

async function _sptDeleteTerm(termId){
  _sptFlush(); // 先把目前 DOM 值存回記憶體，避免重繪後消失
  if(termId>0){
    // 先刪除引用此 term 的 provider_payment_records（FK 限制）
    var rr=await sb.from('provider_payment_records').delete().eq('sp_payment_term_id',termId);
    if(rr.error){ _toast('刪除失敗：'+rr.error.message,'err'); return; }
    var r=await sb.from('sp_payment_terms').delete().eq('id',termId);
    if(r.error){ _toast('刪除失敗：'+r.error.message,'err'); return; }
  }
  WIZ.spPaymentTerms=WIZ.spPaymentTerms.filter(function(t){ return t.id!==termId; });
  _wizRender();
}

async function _sptSave(){
  if(!WIZ.id){ _toast('請先儲存專案','err'); return; }
  var parsed=_payParse(WIZ.project.payment_terms);
  var clientInsts=(parsed&&parsed.items?parsed.items:[]).filter(function(it){ return it.dir==='收'; });
  var defaultUnlock=clientInsts.length?clientInsts[0].id:1;

  var toInsert=[]; var toUpsert=[];
  WIZ.spPaymentTerms.forEach(function(t){
    var lbl=((document.getElementById('spt-lbl-'+t.id)||{}).value||t.label||'款項').trim();
    var amt=parseFloat((document.getElementById('spt-amt-'+t.id)||{}).value)||0;
    var notes=((document.getElementById('spt-notes-'+t.id)||{}).value||'').trim()||null;
    var unlockEl=document.getElementById('spt-unlock-'+t.id);
    var unlockId=unlockEl?parseInt(unlockEl.value):defaultUnlock;
    var row={ project_id:WIZ.id, service_provider_id:t.service_provider_id, installment_index:t.installment_index, label:lbl, amount:amt, currency:t.currency, notes:notes, unlock_client_installment_id:unlockId };
    if(t._isNew||t.id<0) toInsert.push(row);
    else toUpsert.push(Object.assign({id:t.id,updated_at:new Date().toISOString()},row));
  });

  var hasErr=false;
  if(toInsert.length){ var ins=await sb.from('sp_payment_terms').insert(toInsert); if(ins.error){ _toast('儲存失敗：'+ins.error.message,'err'); hasErr=true; } }
  if(!hasErr&&toUpsert.length){
    for(var ui=0;ui<toUpsert.length;ui++){
      var u=toUpsert[ui]; var uid=u.id; var urow=Object.assign({},u); delete urow.id;
      var ur=await sb.from('sp_payment_terms').update(urow).eq('id',uid);
      if(ur.error){ _toast('儲存失敗：'+ur.error.message,'err'); hasErr=true; break; }
    }
  }
  if(hasErr) return;

  await _sptReload();
  // 重建 PPR（清除舊的，從 sp_payment_terms 重新建立）
  // 若有已付款紀錄，先確認——避免誤刪付款歷史
  var paidPprs=(WIZ.providerPayments||[]).filter(function(r){ return r.status==='paid'; });
  if(paidPprs.length>0){
    if(!confirm('已有 '+paidPprs.length+' 筆付款紀錄（已付款）。儲存付款協議將清除這些紀錄並重建，確定繼續？')) return;
  }
  var del=await sb.from('provider_payment_records').delete().eq('project_id',WIZ.id);
  if(del.error){ _toast('重建付款紀錄失敗：'+del.error.message,'err'); return; }
  WIZ.providerPayments=[];
  await _ppInit();
  _toast('付款協議已儲存');
  _wizRender();
}

  function _spAmtHtml(ppr,spId){
    var sp=_find(DB.service_providers,spId);
    var spCur=(sp&&sp.payment_currency)||'TWD';
    var twdAmt=ppr?Number(ppr.amount_twd||0):0;
    var isTwd=(spCur==='TWD');
    var badgeSt=isTwd
      ?'background:#f1f5f9;color:#64748b;border:0.5px solid #cbd5e1;'
      :'background:#dbeafe;color:#1d4ed8;border:0.5px solid #93c5fd;';
    var badge='<span style="font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;vertical-align:middle;'+badgeSt+'">'+spCur+'</span>';
    if(isTwd) return badge+'&nbsp;<span style="font-weight:600;font-variant-numeric:tabular-nums;">NT$ '+_money(twdAmt)+'</span>';
    var spAmtStr='';
    if(spCur===quoteCur&&quoteRate){
      var spAmt=_fxConv(twdAmt,cfg);
      spAmtStr=_fxFmt(spAmt,cfg);
    } else {
      var botRate=(typeof BOT_RATES!=='undefined'&&BOT_RATES&&BOT_RATES[spCur])
        ?(BOT_RATES[spCur].buy+BOT_RATES[spCur].sell)/2:0;
      if(botRate){
        var fa=Math.round(twdAmt/botRate*100)/100;
        spAmtStr=spCur+' '+fa.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
      }
    }
    if(!spAmtStr) return badge+'&nbsp;<span style="font-weight:600;font-variant-numeric:tabular-nums;">NT$ '+_money(twdAmt)+'</span>';
    return badge+'&nbsp;<span style="font-weight:600;font-variant-numeric:tabular-nums;">'+spAmtStr+'</span>&nbsp;<span style="font-size:12px;color:var(--text-dim);">≈ NT$ '+_money(twdAmt)+'</span>';
  }

  // 尚無 records 且有服務商 → 自動初始化
  if(pays.length===0&&WIZ.matches.length>0){
    setTimeout(function(){ _ppInit(); },30);
    return '<div style="max-width:860px;">'+_wizCard(_wizSecTitle('主理人模式｜逐期收付款')+'<div style="padding:24px 0;text-align:center;color:var(--text-dim);font-size:13px;">初始化付款紀錄中，請稍候...</div>')+_wizFooter()+'</div>';
  }

  var totalExpected=insts.length*WIZ.matches.length;
  var paidCount=pays.filter(function(r){ return r.status==='paid'; }).length;
  var allPaid=totalExpected>0&&paidCount>=totalExpected;

  // 計算每期狀態
  function _instStatus(inst){
    var ip=pays.filter(function(r){ return (r.client_unlock_installment_id||r.installment_index)===inst.id; });
    var cAt=ip.length?ip[0].client_received_at:null;
    var spDone=WIZ.matches.length>0&&ip.filter(function(r){ return r.status==='paid'; }).length>=WIZ.matches.length;
    if(spDone&&cAt) return 'done';
    if(cAt) return 'partial';
    return 'pending';
  }

  // 預設顯示第一個未完成的期；全完成則顯示最後一期
  var activeInstId=insts[insts.length-1].id;
  for(var _ii=0;_ii<insts.length;_ii++){
    if(_instStatus(insts[_ii])!=='done'){ activeInstId=insts[_ii].id; break; }

    var statusTxt=st==='done'?'✓ 全部完成':st==='partial'?'付款中':'待收款';
    var statusColor=st==='done'?'#15803d':st==='partial'?'#b45309':'#6b7280';
    var borderSt,bgSt;
    if(st==='done'){ borderSt=isAct?'2px solid #16a34a':'0.5px solid #bbf7d0'; bgSt=isAct?'#f0fdf4':'#f7fef9'; }
    else if(st==='partial'){ borderSt=isAct?'2px solid #1d4ed8':'0.5px solid #fde68a'; bgSt=isAct?'#eff6ff':'#fffbeb'; }
    else { borderSt=isAct?'2px solid #1d4ed8':'0.5px solid var(--border)'; bgSt=isAct?'#eff6ff':'#f8fafc'; }

      'style="display:flex;flex-direction:column;align-items:flex-start;padding:8px 14px;border-radius:8px;border:'+borderSt+';background:'+bgSt+';cursor:pointer;min-width:110px;text-align:left;">'+
      '<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px;">'+
        '<span style="font-size:10px;font-weight:700;padding:1px 8px;border-radius:20px;background:'+pillBg+';color:#fff;">第 '+(idx+1)+' 期</span>'+
      '</div>'+
      '<span style="font-size:12px;font-weight:600;color:var(--text-main);">'+_esc(inst.label||'款項')+'&nbsp;'+pct+'%</span>'+
      '<span style="font-size:11px;color:'+statusColor+';margin-top:2px;">'+statusTxt+'</span>'+

      '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">'+
        (isForex
          ?'<span style="font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;">'+_fxFmt(_fxConv(clientAmt,cfg),cfg)+'</span>&nbsp;<span style="font-size:12px;color:var(--text-dim);">≈ NT$ '+_money(clientAmt)+'</span>'

        (clientAt

          :'<span style="margin-left:auto;display:flex;align-items:center;gap:8px;">'+
            '<input type="datetime-local" id="pp-cdt-'+inst.id+'" value="'+_toLocalInput(new Date().toISOString())+'" class="cm-input" style="background:#fff;">'+
            '<button class="btn btn-primary" style="padding:4px 13px;font-size:12.5px;" onclick="_ppMarkClientReceived('+inst.id+')">標記已收</button>'+
          '</span>')+

    '</div>';

    var spRows=WIZ.matches.map(function(m){

            ?'<button class="btn btn-secondary" style="padding:3px 8px;font-size:11.5px;" onclick="_ppPreviewFile('+pprId+')">預覽</button><button class="btn btn-secondary" style="padding:3px 8px;font-size:11.5px;color:#dc2626;" onclick="_ppDelFile('+pprId+')">刪除</button>'

          )+
        '</div>'+
        // Notes
        '<div style="margin-bottom:10px;">'+

        '</div>'+
        // Pay date + confirm button
        '<div style="display:flex;gap:8px;align-items:flex-end;">'+

          (isClientDone
            ?'<button class="btn btn-primary" style="padding:5px 13px;font-size:12.5px;" onclick="_ppMarkProviderPaid('+pprId+')">標記已付款給服務商</button>'
            :'<button class="btn btn-primary" style="padding:5px 13px;font-size:12.5px;opacity:0.4;" disabled>標記已付款給服務商</button>')+
        '</div>';
      } else if(isPaid){
        row+='<div style="font-size:12px;color:var(--text-mid);display:flex;gap:14px;flex-wrap:wrap;align-items:center;">'+
          (ppr.actual_amount?'<span>實付：<b>'+(ppr.actual_currency||spCur)+' '+Number(ppr.actual_amount).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'</b></span>':'')+
          (ppr.invoice_number?'<span>發票：<b>'+_esc(ppr.invoice_number)+'</b></span>':'')+
          (hasFile?'<button class="btn btn-secondary" style="padding:2px 8px;font-size:11.5px;" onclick="_ppPreviewFile('+pprId+')">預覽發票</button>':'')+
          (ppr.payment_notes?'<span style="color:var(--text-dim);">備註：'+_esc(ppr.payment_notes)+'</span>':'')+

    return '<div id="pp-panel-'+inst.id+'" style="display:'+(isAct?'block':'none')+';padding-top:4px;">'+

      spRows+
    '</div>';

  var panelsHtml=insts.map(_instPanel).join('');

  var rateBanner=isForex
    ?'<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:#f8fafc;border:0.5px solid #e2e8f0;border-radius:8px;margin-bottom:14px;font-size:13px;">'+

      '<span style="color:#64748b;">匯率快照</span>'+
      '<span style="font-weight:600;">'+quoteCur+' 1 = NT$ '+_money(quoteRate)+'</span>'+
      (cfg&&cfg._locked_at?'<span style="font-size:11.5px;color:#94a3b8;">· 鎖定於 '+_dt(cfg._locked_at)+'</span>':'')+
      (cfg&&cfg._cur_locked
        ?'<span style="margin-left:auto;font-size:11px;padding:3px 10px;border-radius:5px;background:#f0fdf4;color:#16a34a;font-weight:600;border:1px solid #bbf7d0;">✓ 已鎖定</span>'
        :'<span style="margin-left:auto;font-size:11px;padding:3px 10px;border-radius:5px;background:#fff7ed;color:#ea580c;font-weight:600;border:1px solid #fed7aa;">即時匯率</span>')+
    '</div>'
    :'';

  var settleCard=allPaid
    ?_wizCard(
        _wizSecTitle('結案分潤')+
        '<div style="font-size:13px;color:var(--text-mid);margin-bottom:14px;">所有期數收付款已完成，可執行結案與商務分潤計算。</div>'+
        '<div style="display:flex;gap:12px;align-items:flex-end;">'+
          '<div><label style="font-size:12.5px;color:var(--text-mid);display:block;margin-bottom:6px;">結案時間</label>'+
          '<input class="cm-input" id="wiz-paid" type="datetime-local" value="'+_toLocalInput(new Date().toISOString())+'" style="background:#fff;"></div>'+
          '<button class="btn btn-primary" onclick="_wizSettle()">結案並計算商務分潤</button>'+
        '</div>'
      )
    :'<div class="table-card" style="background:#f8fafc;border:1px dashed var(--border);"><div style="font-size:13px;color:var(--text-dim);">所有期數的服務商付款完成後，才會開放結案按鈕。（已完成 '+paidCount+' / '+totalExpected+' 筆）</div></div>';

  return '<div style="max-width:860px;">'+
    rateBanner+
    _wizCard(
      _wizSecTitle('主理人模式｜逐期收付款')+
      '<div style="font-size:13px;color:var(--text-mid);margin-bottom:18px;line-height:1.7;">依序記錄每期「客戶付款 → GC 收到 → GC 付款給服務商」。客戶付款確認後才可標記服務商付款。</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">'+tabBtns+'</div>'+
      panelsHtml
    )+
    settleCard+
    _wizFooter()+
  '</div>';
}

function _wizFinHtml(){
  var fr=WIZ.financials||[];
  if(!fr.length) return '';
  var typeLabel={receivable:'應收（客戶）',receivable_provider:'應收（服務商退傭）',payable_provider:'應付服務商',payable_partner:'應付商務'};
  function _finBadgeColor(f){
    if(_finIsIncome(f)) return 'green';
    if(f.record_type==='payable_partner') return 'blue';
    return 'amber';
  }
  // 應收客戶排第一
  var typeOrder={receivable:1,receivable_provider:2,payable_provider:3,payable_partner:4};
  var sorted=fr.slice().sort(function(a,b){ return (typeOrder[a.record_type]||9)-(typeOrder[b.record_type]||9); });
  var rows=sorted.map(function(f){
    var cpName=_finCp(f);
    return '<tr><td>'+_badge(typeLabel[f.record_type]||f.record_type, _finBadgeColor(f))+'</td><td>'+_esc(cpName)+'</td><td style="text-align:right;">'+_money(f.amount_untaxed)+'</td><td style="text-align:right;">'+_money(f.tax)+'</td><td style="text-align:right;font-weight:700;font-variant-numeric:tabular-nums;">'+_money(f.amount)+'</td><td style="color:var(--text-mid);">'+_esc(f.note||'')+'</td></tr>';
  }).join('');
  return '<div style="font-weight:700;font-size:13px;margin:22px 0 8px;">帳務</div><div class="table-card" style="padding:0;"><div class="table-wrap"><table><thead><tr><th>類別</th><th>對象</th><th style="text-align:right;">未稅</th><th style="text-align:right;">稅</th><th style="text-align:right;">金額</th><th>備註</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

async function _wizSettle(){
  var v=document.getElementById('wiz-paid').value;
  var paid=v?new Date(v).toISOString():new Date().toISOString();

  if(WIZ.project.cooperation_mode==='intermediary'){
    // 居間模式：純前端結算，不依賴 RPC（RPC 有 tax_rate NOT NULL bug，無法修復）
    var err=await _wizSettleIntermediary(paid);
    if(err){ _toast('結算失敗：'+err,'err'); return; }
    _toast('已結案，分潤已結算');
  } else {
    // 主理人模式：先結算分潤，成功後再把 status 改成 paid
    // 避免結算失敗時步驟 6 卡在已結案畫面
    var err=await _wizSettlePrincipal(paid);
    if(err){ _toast('結算失敗：'+err,'err'); return; }
    _toast('已結案，分潤已結算');
  }

  var pr=await sb.from('projects').select('*').eq('id',WIZ.id).single(); if(pr.data) WIZ.project=pr.data;
  var rec=await sb.from('commission_records').select('*').eq('project_id',WIZ.id); WIZ.records=rec.data||[];
  var fin=await sb.from('financial_records').select('*').eq('project_id',WIZ.id).order('id'); WIZ.financials=fin.data||[];
  var ppr=await sb.from('provider_payment_records').select('*').eq('project_id',WIZ.id).order('installment_index'); WIZ.providerPayments=ppr.data||[];
  _wizRender();
}

// 主理人模式前端結算：以 projects.quote_settings 鎖定匯率換算外幣，取代 RPC settle_project_commission
async function _wizSettlePrincipal(settledAt){
  var p=WIZ.project;
  if(!WIZ.matches||!WIZ.matches.length) return '尚無服務商配對，無法結算';
  if(!p.customer_id) return '缺少客戶資訊，無法結算';

  var taxRate=Number(p.tax_rate!=null?p.tax_rate:5)/100;
  var now=settledAt||new Date().toISOString();
  var by=currentUser?currentUser.full_name:'admin';

  // 取出鎖定匯率（quote_settings 優先，無則用目前 localStorage cfg）；逐外幣套用鎖定匯率
  var qs=p.quote_settings||_quoteCfg();
  function toTwd(amt,cur){
    amt=Number(amt||0); if(!cur||cur==='TWD') return Math.round(amt);
    return Math.round(amt*_cfgRate(cur,qs));
  }

  // 確保分潤規則已載入
  if(!DB.commission_rules.length){
    var crR=await sb.from('commission_rules').select('*').order('id');
    if(crR.data) DB.commission_rules=crR.data;
  }

  var commInserts=[]; var finInserts=[]; var bpPartner={};
  var orderTypes=WIZ.matchOrderTypes||{};

  WIZ.matches.forEach(function(m){
    var spId=m.service_provider_id;
    var mt=orderTypes[m.id]||{orderType:'first_order',bpId:p.business_partner_id};
    var orderType=mt.orderType;
    // bpId 確保為 number（matchOrderTypes 可能存成 string）
    var bpId=mt.bpId?Number(mt.bpId):null;

    // 此 SP 的客戶收款（items 未稅小計 → TWD，再加稅）
    var items=WIZ.itemsByMatch[m.id]||[];
    var subTwd=items.reduce(function(a,it){
      return a+toTwd(Number(it.amount_untaxed||0),_itemCurrency(it,spId));
    },0);
    var clientTwd=Math.round(subTwd*(1+taxRate));

    // 服務商成本：優先用 provider_payment_records.amount_twd（已用鎖定匯率建立）
    var spPprs=(WIZ.providerPayments||[]).filter(function(r){ return r.service_provider_id===spId; });
    var spCostTwd=spPprs.reduce(function(a,r){ return a+Number(r.amount_twd||0); },0);
    // fallback：sp_payment_terms（用鎖定匯率換算）
    var spTerms=(WIZ.spPaymentTerms||[]).filter(function(t){ return t.service_provider_id===spId; });
    if(!spCostTwd){
      spCostTwd=spTerms.reduce(function(a,t){ return a+toTwd(Number(t.amount||0),t.currency||'TWD'); },0);
    }
    // 服務商成本外幣原值（修正 #3）：優先取 PPR 原值，其次 sp_payment_terms；同幣別才彙總
    var spFx=(function(){
      if(spPprs.length){
        var cur=spPprs[0].orig_currency||null;
        if(cur && cur!=='TWD' && spPprs.every(function(r){ return (r.orig_currency||null)===cur; })){
          return { cur:cur, orig:Math.round(spPprs.reduce(function(a,r){ return a+Number(r.amount_orig||0); },0)*100)/100, rate:Number(spPprs[0].fx_rate||0)||null };
        }
      }
      if(spTerms.length){
        var cur2=spTerms[0].currency||'TWD';
        if(cur2 && cur2!=='TWD' && spTerms.every(function(t){ return (t.currency||'TWD')===cur2; })){
          var rate2=_cfgRate(cur2,qs);
          return { cur:cur2, orig:Math.round(spTerms.reduce(function(a,t){ return a+Number(t.amount||0); },0)*100)/100, rate:rate2 };
        }
      }
      return null;
    })();

    var profit=subTwd-spCostTwd;
    var rule=_ruleRow(orderType);
    var pct=bpId?(rule?Number(rule.partner_percent||0):(orderType==='first_order'?65:35)):0;
    var partnerUntax=Math.round(profit*pct/100);
    var partnerTax=Math.round(partnerUntax*(1+taxRate));
    var gcUntax=profit-partnerUntax;

    // business_partner_id NOT NULL → 無 BP 的 match 不寫 commission_records
    if(bpId){
      var bFxC=_bpFxRate(bpId); // 商務夥伴幣別（以結算當下台銀匯率快照）
      commInserts.push({
        project_id:WIZ.id, project_match_id:m.id, customer_id:p.customer_id,
        service_provider_id:spId, business_partner_id:bpId, order_type:orderType,
        profit_untaxed:profit, partner_percent:pct, gc_percent:100-pct,
        tax_rate:Number(p.tax_rate!=null?p.tax_rate:5),
        partner_amount_untaxed:partnerUntax, partner_amount_taxed:partnerTax,
        gc_amount_untaxed:gcUntax, settled_time:now, status:'settled',
        created_time:now, updated_time:now, partner_payment_status:'pending',
        bp_currency:bFxC?bFxC.cur:null, bp_fx_rate:bFxC?bFxC.rate:null,
        partner_amount_untaxed_orig:bFxC?_fxOrigAmt(partnerUntax,bFxC):null,
        partner_amount_taxed_orig:bFxC?_fxOrigAmt(partnerTax,bFxC):null
      });
      if(partnerTax>0) bpPartner[String(bpId)]=(bpPartner[String(bpId)]||0)+partnerTax;
    }

    // 帳務：應付服務商（含外幣原值）
    finInserts.push({ project_id:WIZ.id, record_type:'payable_provider', counterparty_id:spId, amount_untaxed:spCostTwd, tax:0, amount:spCostTwd, status:'pending', created_time:now, updated_time:now,
      orig_currency:spFx?spFx.cur:null, fx_rate:spFx?spFx.rate:null, amount_untaxed_orig:spFx?spFx.orig:null, tax_orig:spFx?0:null, amount_orig:spFx?spFx.orig:null });
  });

  // 帳務：應收客戶（沿用專案儲存的台幣總額）
  finInserts.push({ project_id:WIZ.id, record_type:'receivable', counterparty_id:p.customer_id, amount_untaxed:Number(p.total_untaxed||0), tax:Number(p.total_tax||0), amount:Number(p.total_amount||0), status:'pending', created_time:now, updated_time:now });

  // 帳務：應付商務夥伴（含外幣原值）
  Object.keys(bpPartner).forEach(function(bid){
    var taxed=bpPartner[bid]; var untax=Math.round(taxed/(1+taxRate)); var tax=taxed-untax;
    var bFxP=_bpFxRate(Number(bid));
    finInserts.push({ project_id:WIZ.id, record_type:'payable_partner', counterparty_id:Number(bid), amount_untaxed:untax, tax:tax, amount:taxed, status:'pending', created_time:now, updated_time:now,
      orig_currency:bFxP?bFxP.cur:null, fx_rate:bFxP?bFxP.rate:null, amount_untaxed_orig:bFxP?_fxOrigAmt(untax,bFxP):null, tax_orig:bFxP?_fxOrigAmt(tax,bFxP):null, amount_orig:bFxP?_fxOrigAmt(taxed,bFxP):null });
  });

  // 清除舊紀錄（作廢重結或重複結算）
  var d1=await sb.from('commission_records').delete().eq('project_id',WIZ.id);
  if(d1.error) return d1.error.message;
  var d2=await sb.from('financial_records').delete().eq('project_id',WIZ.id);
  if(d2.error) return d2.error.message;

  // 標記操作人（結算者）
  var _stBy=currentUser?currentUser.full_name:'admin';
  commInserts.forEach(function(x){ x.updated_by=_stBy; });
  finInserts.forEach(function(x){ x.updated_by=_stBy; });
  // commInserts 可能為空（所有 match 皆無 BP），僅在有資料時 insert
  if(commInserts.length){
    var i1=await sb.from('commission_records').insert(commInserts);
    if(i1.error) return i1.error.message;
  }
  var i2=await sb.from('financial_records').insert(finInserts);
  if(i2.error) return i2.error.message;

  // 全部成功後才把 status 改成 paid
  var ok=await _wizSaveProject({ status:'paid', paid_time:settledAt, is_settled:true, settled_by:currentUser?currentUser.full_name:'admin' });
  if(!ok) return '專案狀態更新失敗，請重試'; // _wizSaveProject 失敗時已有 toast
  return null; // null = 成功
}

// 居間模式前端結算：取代 settle_intermediary_commission RPC，避免 tax_rate NOT NULL 問題
async function _wizSettleIntermediary(settledAt){
  var p=WIZ.project;
  if(!WIZ.matches||!WIZ.matches.length) return '尚無服務商配對，無法結算';
  if(!p.customer_id) return '缺少客戶資訊，無法結算';

  var taxRate=Number(p.tax_rate!=null?p.tax_rate:5);
  var taxRatePct=taxRate/100;
  var now=settledAt||new Date().toISOString();

  // 確保分潤規則已載入
  if(!DB.commission_rules.length){
    var crR=await sb.from('commission_rules').select('*').order('id');
    if(crR.data) DB.commission_rules=crR.data;
  }

  var hasBp=!!p.business_partner_id;
  var bpRule=_ruleRow('first_order');
  var partnerPct=hasBp?(bpRule?Number(bpRule.partner_percent||0):65):0;
  var bpFxI=hasBp?_bpFxRate(p.business_partner_id):null; // 商務夥伴幣別（結算當下台銀匯率快照）

  var commInserts=[]; var finInserts=[];
  var totalRebateUntax=0;

  WIZ.matches.forEach(function(m){
    var spId=m.service_provider_id;
    var items=WIZ.itemsByMatch[m.id]||[];

    // 此 SP 的退傭金額（未稅，TWD）
    var rebate=0;
    items.forEach(function(it){
      var itCur=_itemCurrency(it,spId);
      var amtTwd=_itemToTwd(Number(it.amount_untaxed||0),itCur);
      rebate+=Math.round(amtTwd*(Number(it.base_price||0))/100*100)/100;
    });
    rebate=Math.round(rebate);

    var rebateTax=Math.round(rebate*taxRatePct);
    var rebateTaxed=rebate+rebateTax;
    var partnerUntax=Math.round(rebate*partnerPct/100);
    var partnerTax=Math.round(partnerUntax*(1+taxRatePct));
    var gcUntax=rebate-partnerUntax;

    totalRebateUntax+=rebate;

    // 退傭原幣（修正 #3）：以服務商收款幣別與結算當下台銀匯率快照換算
    var spI=_find(DB.service_providers,spId);
    var spCurI=(spI&&spI.payment_currency)||'TWD';
    var sfx=(spCurI!=='TWD'&&BOT_RATES[spCurI])?{cur:spCurI,rate:(BOT_RATES[spCurI].buy+BOT_RATES[spCurI].sell)/2}:null;

    // commission_records：有 BP 才寫
    if(hasBp){
      commInserts.push({
        project_id:WIZ.id, project_match_id:m.id, customer_id:p.customer_id,
        service_provider_id:spId, business_partner_id:p.business_partner_id,
        order_type:'first_order',
        profit_untaxed:rebate, partner_percent:partnerPct, gc_percent:100-partnerPct,
        tax_rate:taxRate,
        partner_amount_untaxed:partnerUntax, partner_amount_taxed:partnerTax,
        gc_amount_untaxed:gcUntax,
        settled_time:now, status:'settled',
        created_time:now, updated_time:now, partner_payment_status:'pending',
        sp_currency:sfx?sfx.cur:null, sp_fx_rate:sfx?sfx.rate:null, profit_untaxed_orig:sfx?_fxOrigAmt(rebate,sfx):null,
        bp_currency:bpFxI?bpFxI.cur:null, bp_fx_rate:bpFxI?bpFxI.rate:null,
        partner_amount_untaxed_orig:bpFxI?_fxOrigAmt(partnerUntax,bpFxI):null,
        partner_amount_taxed_orig:bpFxI?_fxOrigAmt(partnerTax,bpFxI):null
      });
    }

    // 帳務：應收退傭（每個 SP 一筆，SP 付給 GC）
    // 結案即代表已收到退傭，status 直接設為 paid；record_type 用 receivable_provider 以區分客戶應收
    finInserts.push({
      project_id:WIZ.id, record_type:'receivable_provider',
      counterparty_id:spId,
      amount_untaxed:rebate, tax:rebateTax, amount:rebateTaxed,
      status:'paid', created_time:now, updated_time:now,
      orig_currency:sfx?sfx.cur:null, fx_rate:sfx?sfx.rate:null,
      amount_untaxed_orig:sfx?_fxOrigAmt(rebate,sfx):null, tax_orig:sfx?_fxOrigAmt(rebateTax,sfx):null, amount_orig:sfx?_fxOrigAmt(rebateTaxed,sfx):null
    });
  });

  // 帳務：應付業務夥伴（所有 SP 退傭加總後的分潤）
  if(hasBp&&totalRebateUntax>0){
    var bpUntax=Math.round(totalRebateUntax*partnerPct/100);
    var bpTax=Math.round(bpUntax*taxRatePct);
    var bpAmt=bpUntax+bpTax;
    finInserts.push({
      project_id:WIZ.id, record_type:'payable_partner',
      counterparty_id:p.business_partner_id,
      amount_untaxed:bpUntax, tax:bpTax, amount:bpAmt,
      status:'pending', created_time:now, updated_time:now,
      orig_currency:bpFxI?bpFxI.cur:null, fx_rate:bpFxI?bpFxI.rate:null,
      amount_untaxed_orig:bpFxI?_fxOrigAmt(bpUntax,bpFxI):null, tax_orig:bpFxI?_fxOrigAmt(bpTax,bpFxI):null, amount_orig:bpFxI?_fxOrigAmt(bpAmt,bpFxI):null
    });
  }

  // 清除舊紀錄
  var d1=await sb.from('commission_records').delete().eq('project_id',WIZ.id);
  if(d1.error) return d1.error.message;
  var d2=await sb.from('financial_records').delete().eq('project_id',WIZ.id);
  if(d2.error) return d2.error.message;

  // 標記操作人（結算者）
  var _stBy=currentUser?currentUser.full_name:'admin';
  commInserts.forEach(function(x){ x.updated_by=_stBy; });
  finInserts.forEach(function(x){ x.updated_by=_stBy; });
  // 寫入新紀錄
  if(commInserts.length){
    var i1=await sb.from('commission_records').insert(commInserts);
    if(i1.error) return i1.error.message;
  }
  if(finInserts.length){
    var i2=await sb.from('financial_records').insert(finInserts);
    if(i2.error) return i2.error.message;
  }

  // 更新專案（含 tax_rate，確保寫入）
  var ok=await _wizSaveProject({ status:'paid', paid_time:settledAt, is_settled:true, tax_rate:taxRate, settled_by:currentUser?currentUser.full_name:'admin' });
  if(!ok) return '專案狀態更新失敗，請重試';
  return null; // null = 成功
}

// ════════════ Provider Payment Records 輔助函式 ════════════
async function _ppReload(){
  if(!WIZ||!WIZ.id) return;
  var r=await sb.from('provider_payment_records').select('*').eq('project_id',WIZ.id).order('installment_index');
  WIZ.providerPayments=r.data||[];
}

async function _ppInit(){
  if(!WIZ.id||!WIZ.matches.length) return;
  var p=WIZ.project;
  if(p.cooperation_mode!=='principal') return;
  var spts=WIZ.spPaymentTerms||[];
  if(!spts.length) return; // 須先完成付款協議
  var existing=WIZ.providerPayments||[];
  var cfg=_quoteCfg(); var quoteCur=(cfg&&cfg.currency)||'TWD'; var quoteRate=_quoteRate(cfg)||1;
  var toInsert=[];
  spts.forEach(function(spt){
    // 跳過未存檔的暫存條目（tempId 為負數或 _isNew）
    if(spt._isNew||!spt.id||spt.id<0) return;
    var has=existing.some(function(r){ return r.sp_payment_term_id===spt.id; });
    if(!has){
      var twdAmt; var rateUsed=1;
      if(spt.currency==='TWD'){ twdAmt=Math.round(Number(spt.amount||0)); rateUsed=1; }
      else if(spt.currency===quoteCur&&quoteRate){ twdAmt=Math.round(Number(spt.amount||0)*quoteRate); rateUsed=quoteRate; }
      else {
        var botRate=(typeof BOT_RATES!=='undefined'&&BOT_RATES&&BOT_RATES[spt.currency])?(BOT_RATES[spt.currency].buy+BOT_RATES[spt.currency].sell)/2:0;
        twdAmt=botRate?Math.round(Number(spt.amount||0)*botRate):Math.round(Number(spt.amount||0));
        rateUsed=botRate||1;
      }
      // 存外幣原值 + 當時鎖定匯率（修正 #3：顯示時直接讀，不再用即時匯率回推）
      toInsert.push({ project_id:WIZ.id, service_provider_id:spt.service_provider_id, sp_payment_term_id:spt.id, installment_index:spt.installment_index, installment_label:spt.label||'款項', installment_pct:0, amount_twd:twdAmt, amount_orig:Number(spt.amount||0), orig_currency:spt.currency||'TWD', fx_rate:rateUsed, client_unlock_installment_id:spt.unlock_client_installment_id, status:'pending' });
    }
  });
  if(toInsert.length){
    var ins=await sb.from('provider_payment_records').insert(toInsert);
    if(ins.error){ _toast('初始化付款紀錄失敗：'+ins.error.message,'err'); return; }
  }
  await _ppReload();
  _wizRender(); // 初始化完成後重新渲染，讓 UI 脫離「初始化中」loading 畫面
}

// 根據 WIZ.providerPayments 即時同步 financial_records 的 paid/pending 狀態
async function _ppSyncFinancials(){
  if(!WIZ||!WIZ.id) return;
  var pays=WIZ.providerPayments||[];
  var now=new Date().toISOString();

  // 客戶應收：所有 PPR 都有 client_received_at → paid
  var allClientRecv=pays.length>0&&pays.every(function(r){ return !!r.client_received_at; });
  await sb.from('financial_records').update({status:allClientRecv?'paid':'pending',updated_time:now,updated_by:currentUser?currentUser.full_name:'admin'})
    .eq('project_id',WIZ.id).eq('record_type','receivable');

  // 服務商應付：逐 SP，所有節點都 paid → paid
  var spIds=[...new Set(pays.map(function(r){ return r.service_provider_id; }))];
  for(var i=0;i<spIds.length;i++){
    var spId=spIds[i];
    var spPays=pays.filter(function(r){ return r.service_provider_id===spId; });
    var allPaid=spPays.length>0&&spPays.every(function(r){ return r.status==='paid'; });
    await sb.from('financial_records').update({status:allPaid?'paid':'pending',updated_time:now,updated_by:currentUser?currentUser.full_name:'admin'})
      .eq('project_id',WIZ.id).eq('record_type','payable_provider').eq('counterparty_id',spId);
  }
}

async function _ppPreviewFileByPath(path){

function _ppTabSwitch(activeId){
  document.querySelectorAll('[id^="pp-panel-"]').forEach(function(el){ el.style.display='none'; });
  var ap=document.getElementById('pp-panel-'+activeId);
  if(ap) ap.style.display='block';
  document.querySelectorAll('[id^="pp-tab-"]').forEach(function(btn){
    var st=btn.dataset.status;
    var isAct=(btn.id==='pp-tab-'+activeId);
    if(st==='done'){
      btn.style.border=isAct?'2px solid #16a34a':'0.5px solid #bbf7d0';
      btn.style.background=isAct?'#f0fdf4':'#f7fef9';
    } else if(st==='partial'){
      btn.style.border=isAct?'2px solid #1d4ed8':'0.5px solid #fde68a';
      btn.style.background=isAct?'#eff6ff':'#fffbeb';
    } else {
      btn.style.border=isAct?'2px solid #1d4ed8':'0.5px solid var(--border)';
      btn.style.background=isAct?'#eff6ff':'#f8fafc';
    }
  });
}

// ── 主理人模式合併步驟：付款協議 + 客戶收款 + 服務商付款 ──
function _wizStep8PrincCombined(){
  if(!WIZ.id) return '<div style="color:var(--text-dim);padding:20px 0;">請先完成前面的步驟。</div>'+_wizFooter();
  var p=WIZ.project;

  var cfg=_quoteCfg();
  var quoteCur=(cfg&&cfg.currency)||'TWD';
  var quoteRate=_quoteRate(cfg)||1;
  var isForex=(quoteCur!=='TWD');

  // ── 已結案 ──
  if(done){
    var recHtml='';
    if(WIZ.records.length){
      recHtml='<div style="font-weight:700;font-size:13px;margin:20px 0 8px;">分潤結算</div><div class="table-card" style="padding:0;"><div class="table-wrap"><table><thead><tr><th>服務商</th><th>類型</th><th>領取商務</th><th style="text-align:right;">毛利</th><th style="text-align:right;">商務%</th><th style="text-align:right;">商務未稅</th><th style="text-align:right;">商務含稅</th></tr></thead><tbody>'+
        WIZ.records.map(function(c){ return '<tr><td>'+_esc(_spName(c.service_provider_id))+'</td><td>'+_orderTypeBadge(c.order_type)+'</td><td>'+_esc(_bpName(c.business_partner_id))+'</td><td style="text-align:right;">'+_money(c.profit_untaxed)+'</td><td style="text-align:right;">'+c.partner_percent+'%</td><td style="text-align:right;">'+_money(c.partner_amount_untaxed)+'</td><td style="text-align:right;font-weight:700;">'+_money(c.partner_amount_taxed)+'</td></tr>'; }).join('')+
        '</tbody></table></div></div>';
    } else {
      var noRec=p.business_partner_id?'已結案，但分潤結算失敗。請使用右上「作廢重結」後重新結算。':'已結案，但無分潤紀錄（此專案為直客）。';
      recHtml='<div style="margin-top:16px;font-size:12.5px;color:var(--text-mid);background:#fffbeb;border:1px solid #fde68a;border-radius:9px;padding:12px 14px;">'+noRec+'</div>';
    }
    recHtml+=_wizFinHtml();
    return '<div style="max-width:860px;">'+
      _wizCard(_wizSecTitle('主理人模式｜收付款管理')+
        '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:14px 16px;font-size:13px;color:#166534;">✓ 已於 '+_dt(p.paid_time)+' 收款結案'+(p.is_settled?'，分潤與帳務已產生':'')+(p.settled_by?'　結案人：'+_esc(p.settled_by):'')+'。如需修改可用右上「作廢重結」。</div>')+
      _ppDoneDetail()+recHtml+_wizFooter()+

  // ── 自動初始化 PPR（只有已存檔的 term 才觸發，避免 _isNew 暫存條目造成 FK 錯誤或無限 loop）──
  var savedSpts=spts.filter(function(t){ return !t._isNew&&t.id&&t.id>0; });
  if(savedSpts.length>0&&pays.length===0&&WIZ.matches.length>0){
    setTimeout(function(){ _ppInit(); },30);
    return '<div style="max-width:860px;">'+_wizCard(_wizSecTitle('主理人模式｜收付款管理')+'<div style="padding:24px 0;text-align:center;color:var(--text-dim);font-size:13px;">初始化付款紀錄中，請稍候...</div>')+_wizFooter()+'</div>';
  }

  // ══ Section 1：付款協議 ══
  var unlockOpts=insts.map(function(ci,ciIdx){
    return '<option value="'+ci.id+'">收到客戶第'+(ciIdx+1)+'期（'+_esc(ci.label||'款項')+'）</option>';

  var hasAll=WIZ.matches.length>0&&WIZ.matches.every(function(m){ return spts.some(function(t){ return t.service_provider_id===m.service_provider_id; }); });

      var items=WIZ.itemsByMatch[m.id]||[];
      var refTwd=items.reduce(function(s,it){ var bp=Number(it.base_price||0);return s+_itemToTwd(bp,_itemCurrency(it,spId)); },0);

          diffStr=isMatch?'✓ 吻合':((total>refTwd?'多付':'少付')+' NT$ '+_money(Math.abs(total-refTwd)));
        } else {
          var refFx=botRate?Math.round(refTwd/botRate*100)/100:0;
          refDisplay=spCur+' '+refFx.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+'<span style="font-size:11px;color:var(--text-dim);margin-left:4px;">≈ NT$ '+_money(refTwd)+'</span>';
          isMatch=Math.abs(total-refFx)<0.02;
          diffStr=isMatch?'✓ 吻合':((total>refFx?'多付':'少付')+' '+spCur+' '+Math.abs(total-refFx).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}));

          '<span style="font-size:11px;color:var(--text-dim);font-weight:700;text-align:center;">#'+(idx+1)+'</span>'+
          '<input class="cm-input" id="spt-lbl-'+t.id+'" value="'+_esc(t.label||'')+'" placeholder="標籤" style="font-size:12px;padding:5px 8px;">'+
          '<div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:7px;overflow:hidden;background:#fff;"><span style="padding:0 8px;font-size:11.5px;color:var(--text-dim);background:#f8fafc;border-right:1px solid var(--border);white-space:nowrap;align-self:stretch;display:flex;align-items:center;">'+spCur+'</span><input type="number" class="cm-input" id="spt-amt-'+t.id+'" value="'+amtVal+'" step="'+(isTwd?'1':'0.01')+'" oninput="_sptLiveUpdate('+spId+')" style="border:none;font-size:12px;padding:5px 8px;font-variant-numeric:tabular-nums;background:transparent;"></div>'+

          actionCell='<span style="font-size:12px;color:var(--text-dim);">—</span>';

  var spPayBadge='<span style="font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;background:'+(paidPays===totalPays&&totalPays>0?'#f0fdf4':'#f1f5f9')+';color:'+(paidPays===totalPays&&totalPays>0?'#16a34a':'#475569')+';border:0.5px solid '+(paidPays===totalPays&&totalPays>0?'#bbf7d0':'#cbd5e1')+';">'+paidPays+' / '+totalPays+' 筆已付</span>';

  // ══ Section 4：結算 ══
  var allPaid=totalPays>0&&paidPays>=totalPays;
  var canSettle=allPaid&&clientRecvCount>=insts.length&&insts.length>0;
  var settleCard=canSettle
    ?_wizCard(_wizSecTitle('結算分潤')+'<div style="font-size:13px;color:var(--text-mid);margin-bottom:14px;">所有期數收付款已完成，可執行結案與商務分潤計算。</div>'+
        '<div style="display:flex;gap:12px;align-items:flex-end;">'+

    :'<div class="table-card" style="background:#f8fafc;border:1px dashed var(--border);"><div style="font-size:13px;color:var(--text-dim);">所有客戶收款及服務商付款完成後，才會開放結案按鈕。（付款進度 '+paidPays+' / '+totalPays+' 筆）</div></div>';

  return '<div style="max-width:860px;">'+

async function loadProjectMatches(){

  var pr=await sb.from('projects').select('id,project_no,customer_id,tax_rate'); if(pr.data){ pr.data.forEach(function(p){ var ex=_find(DB.projects,p.id); if(ex){ ex.tax_rate=p.tax_rate; } else { DB.projects.push(p); } }); }
  var mm=await sb.from('project_matches').select('*').order('id',{ascending:false});
  if(mm.error){ main.innerHTML=_errBox(mm.error.message); return; }
  DB.project_matches=mm.data||[];
  // order_type / business_partner_id 不會寫進 project_matches，改由 commission_records 回填（依 project_match_id 對照）
  var cr=await sb.from('commission_records').select('project_match_id,order_type,business_partner_id');

  (cr.data||[]).forEach(function(c){ if(c.project_match_id!=null && !DB.pm_crec_map[c.project_match_id]) DB.pm_crec_map[c.project_match_id]=c; });
  pmPage=1; pmFilterFrom=''; pmFilterTo='';
  msReset('pm-type','pm-sp','pm-cust','pm-bp');

}
function _projOf(id){ var p=_find(DB.projects,id); return p?(p.project_no||('專案 #'+p.id)):('專案 #'+id); }
function _projCust(id){ var p=_find(DB.projects,id); return p?_custName(p.customer_id):'—'; }
function _projTaxRate(id){ var p=_find(DB.projects,id); return (p&&p.tax_rate!=null)?Number(p.tax_rate):5; }
function renderProjectMatches(){
  var main=document.getElementById('main-content');
  var ds='class="cm-input" style="width:auto;font-size:12.5px;padding:4px 8px;"';
  var spOpts=(DB.service_providers||[]).map(function(s){ return {v:s.id,l:(s.company_name||s.contact_name||('#'+s.id))}; });
  var custOpts=(DB.customers||[]).map(function(c){ return {v:c.id,l:(c.company_name||('#'+c.id))}; });
  main.innerHTML=_pageHeader('專案管理','合作紀錄','project_matches','客戶 × 服務商 媒合紀錄，供系統判斷首單／回購')+
    '<div class="toolbar"><div class="toolbar-left" style="flex-wrap:wrap;gap:8px;">'+
      msDropdown('pm-type','全部類型',[{v:'first_order',l:'首單'},{v:'repurchase',l:'回購'},{v:'intermediary',l:'居間'}],'_pmApply')+
      msDropdown('pm-sp','全部服務商',spOpts,'_pmApply')+
      msDropdown('pm-cust','全部客戶',custOpts,'_pmApply')+
      msDropdown('pm-bp','全部分潤商務',[{v:'has',l:'有分潤商務'},{v:'none',l:'無（直客）'}],'_pmApply')+
      '<input type="date" '+ds+' value="'+_esc(pmFilterFrom)+'" title="建立起日" onchange="pmSetFilter(\'from\',this.value)">'+
      '<span style="color:var(--text-dim);font-size:12px;align-self:center;">~</span>'+
      '<input type="date" '+ds+' value="'+_esc(pmFilterTo)+'" title="建立迄日" onchange="pmSetFilter(\'to\',this.value)">'+

    '<div class="table-card"><div class="table-wrap"><table id="pm-table"></table></div><div id="pm-pager" class="pagination"></div></div>';
  updatePmTable();
}
function pmSetFilter(kind,val){
  if(kind==='from') pmFilterFrom=val;
  else if(kind==='to') pmFilterTo=val;
  pmPage=1; updatePmTable();
}
function _pmApply(){ pmPage=1; updatePmTable(); }
function _pmOf(m){
  var enrich=(DB.pm_crec_map||{})[m.id];
  var otype=m.order_type||(enrich&&enrich.order_type)||'';
  if(otype==='repeat') otype='repurchase';
  var bpId=m.business_partner_id||(enrich&&enrich.business_partner_id)||null;
  return {otype:otype,bpId:bpId};
}
function _pmFiltered(){
  var fType=msSel('pm-type'), fSp=msSel('pm-sp'), fCust=msSel('pm-cust'), fBp=msSel('pm-bp');
  return DB.project_matches.filter(function(m){
    var e=_pmOf(m);
    if(fType.length && fType.indexOf(e.otype)<0) return false;
    if(fSp.length && fSp.indexOf(String(m.service_provider_id))<0) return false;
    if(fCust.length){ var proj=_find(DB.projects,m.project_id); var cid=proj?proj.customer_id:null; if(fCust.indexOf(String(cid||''))<0) return false; }
    if(fBp.length){ var key=e.bpId?'has':'none'; if(fBp.indexOf(key)<0) return false; }
    if(pmFilterFrom||pmFilterTo){ var d=(m.created_time||'').slice(0,10); if(pmFilterFrom&&d<pmFilterFrom) return false; if(pmFilterTo&&d>pmFilterTo) return false; }
    return true;
  });
}
function exportProjectMatches(){
  var header=['專案','客戶','服務商','訂單類型','分潤商務','建立時間','最後操作人'];
  var rows=_pmFiltered().map(function(m){
    var e=_pmOf(m);
    var otl=e.otype==='first_order'?'首單':e.otype==='repurchase'?'回購':e.otype==='intermediary'?'居間':'';
    return [_projOf(m.project_id), _projCust(m.project_id), _spName(m.service_provider_id), otl, e.bpId?_bpName(e.bpId):'—', m.created_time?_dt(m.created_time):'', m.updated_by||''];
  });
  _downloadCsv('合作紀錄',header,rows);
}
function updatePmTable(){
  var rows=_pmFiltered();
  var total=Math.max(1,Math.ceil(rows.length/PAGE_SIZE)); if(pmPage>total) pmPage=total;
  var slice=rows.slice((pmPage-1)*PAGE_SIZE,pmPage*PAGE_SIZE);
  var head='<thead><tr><th style="width:50px;">#</th><th>專案</th><th>客戶</th><th>服務商</th><th style="width:80px;">類型</th><th>分潤商務</th><th style="width:160px;">建立時間</th><th style="width:110px;">最後操作人</th></tr></thead>';
  var body=slice.length? slice.map(function(m,idx){
    var rowNo=rows.length-(pmPage-1)*PAGE_SIZE-idx;
    var enrich=(DB.pm_crec_map||{})[m.id];
    var otype=m.order_type||(enrich&&enrich.order_type)||null;
    var bpId=m.business_partner_id||(enrich&&enrich.business_partner_id)||null;
    return '<tr><td class="id-cell">'+rowNo+'</td><td>'+_esc(_projOf(m.project_id))+'</td><td>'+_esc(_projCust(m.project_id))+'</td><td>'+_esc(_spName(m.service_provider_id))+'</td>'+
      '<td>'+_orderTypeBadge(otype)+'</td>'+
      '<td>'+_esc(bpId?_bpName(bpId):'—')+'</td>'+
      '<td style="white-space:nowrap;color:var(--text-mid);">'+(m.created_time?_dt(m.created_time):'—')+'</td>'+
      '<td style="white-space:nowrap;color:var(--text-mid);">'+_esc(m.updated_by||'—')+'</td></tr>';
  }).join(''):renderEmptyState(8);
  document.getElementById('pm-table').innerHTML=head+'<tbody>'+body+'</tbody>';
  document.getElementById('pm-pager').innerHTML='<span>共 '+rows.length+' 筆資料</span><div class="page-controls">'+buildPageBtns(pmPage,total,'goPmPage')+'</div>';
}
function goPmPage(p){ pmPage=p; updatePmTable(); }

// ════════════ 分潤紀錄 commission_records ════════════
var crecFilterUnpaid=false;
var crecSearch='';
var crecExpanded={};

async function loadCommissionRecords(){
  var main=document.getElementById('main-content'); main.innerHTML=_loading();
  await _ensureRefData();
  var pr=await sb.from('projects').select('id,project_no,customer_id,cooperation_mode');
  if(pr.data){ pr.data.forEach(function(p){ if(!_find(DB.projects,p.id)) DB.projects.push(p); }); }

  if(cr.error){ main.innerHTML=_errBox(cr.error.message); return; }
  DB.commission_records=cr.data||[];
  var fr=await sb.from('financial_records').select('*').order('project_id');
  DB.financial_records_all=fr.data||[];
  var ppr=await sb.from('provider_payment_records').select('*').order('project_id');

function renderCommissionRecords(){
  var main=document.getElementById('main-content');
  var allRecs=DB.commission_records;
  // 依 BP 幣別分組計算待付金額
  var pendingByCur={TWD:0,USD:0,JPY:0,CNY:0};
  allRecs.filter(function(c){ return (c.partner_payment_status||'pending')==='pending'&&c.business_partner_id; }).forEach(function(c){
    var bfx=_bpFxRateRec(c);
    if(bfx){ pendingByCur[bfx.cur]+=((c.partner_amount_taxed_orig!=null?Number(c.partner_amount_taxed_orig):_fxOrigAmt(Number(c.partner_amount_taxed||0),bfx))||0); }
    else { pendingByCur['TWD']+=Number(c.partner_amount_taxed||0); }
  });
  var totalTaxed=allRecs.reduce(function(a,c){ return a+Number(c.partner_amount_taxed||0); },0);
  function _crecCurSummary(byCur){
    return FIN_CURS.map(function(cur){
      var amt=byCur[cur]||0;
      var amtStr=cur==='TWD'?_money(amt):Number(amt).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2});
      var dim=amt===0;
      return '<span style="margin-right:18px;'+(dim?'opacity:0.45;':'')+'">'+
        '<span style="font-size:11px;color:var(--text-mid);font-weight:500;margin-right:3px;">'+cur+'</span>'+
        '<b style="color:#d97706;">'+amtStr+'</b>'+
      '</span>';
    }).join('');
  }

  main.innerHTML=_pageHeader('財務管理','商務分潤紀錄','commission_records','結案後的分潤結算，可標記商務獎金支付狀態')+
    '<div style="margin-bottom:14px;">'+
      '<div style="font-size:12px;color:var(--text-mid);margin-bottom:4px;font-weight:500;">待付商務獎金（含稅）</div>'+
      '<div style="font-size:13px;">'+_crecCurSummary(pendingByCur)+'</div>'+
      '<div style="font-size:12px;color:var(--text-dim);margin-top:6px;">歷史應付合計：NT$ '+_money(totalTaxed)+'</div>'+
    '</div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center;">'+
      '<input class="cm-input" placeholder="搜尋專案、客戶、商務夥伴…" value="'+_esc(crecSearch)+'" oninput="crecSearch=this.value;crecPage=1;updateCrecTable()" style="width:300px;font-size:12.5px;padding:5px 10px;">'+
      '<select class="cm-input" style="width:auto;font-size:12.5px;padding:5px 10px;" onchange="crecFilterUnpaid=(this.value===\'unpaid\');crecPage=1;updateCrecTable()">'+
        '<option value=""'+(crecFilterUnpaid?'':' selected')+'>全部狀態</option>'+
        '<option value="unpaid"'+(crecFilterUnpaid?' selected':'')+'>僅未支付</option>'+
      '</select>'+
      '<button class="btn btn-secondary" onclick="exportCommissionRecords()" style="margin-left:auto;font-size:12.5px;padding:5px 14px;display:flex;align-items:center;gap:6px;">'+
        '<svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 3v10M6 9l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 15h12" stroke-linecap="round"/></svg>匯出 CSV'+
      '</button>'+
    '</div>'+
    '<div class="table-card" style="padding:0;"><div class="table-wrap"><table id="crec-table" style="width:100%;border-collapse:collapse;"></table></div><div id="crec-pager" class="pagination" style="padding:12px 16px;"></div></div>';
  updateCrecTable();
}

function _crecMatchSearch(pid, recs){
  if(!crecSearch) return true;
  var q=crecSearch.toLowerCase();
  if(_projOf(pid).toLowerCase().indexOf(q)>=0) return true;
  var proj=_find(DB.projects,pid);
  if(proj&&_custName(proj.customer_id).toLowerCase().indexOf(q)>=0) return true;
  if(recs.some(function(c){ return c.business_partner_id&&_bpName(c.business_partner_id).toLowerCase().indexOf(q)>=0; })) return true;
  return false;
}
function updateCrecTable(){
  // 先以專案分組（所有紀錄）
  var allGroups={}; var allOrder=[];
  DB.commission_records.forEach(function(c){
    if(!allGroups[c.project_id]){ allGroups[c.project_id]=[]; allOrder.push(c.project_id); }
    allGroups[c.project_id].push(c);
  });
  // 套用篩選
  var order=allOrder.filter(function(pid){
    var recs=allGroups[pid];
    if(crecFilterUnpaid&&!recs.some(function(c){ return (c.partner_payment_status||'pending')==='pending'&&c.business_partner_id; })) return false;
    if(!_crecMatchSearch(pid,recs)) return false;
    return true;
  });
  var groups=allGroups;

  var total=Math.max(1,Math.ceil(order.length/PAGE_SIZE));
  if(crecPage>total) crecPage=total;
  var slicePids=order.slice((crecPage-1)*PAGE_SIZE,crecPage*PAGE_SIZE);

  var head='<thead><tr style="background:#f8f9fb;font-size:12px;">'+
    '<th style="width:28px;padding:10px 8px;"></th>'+
    '<th style="padding:10px 12px;">專案</th>'+
    '<th style="padding:10px 12px;">客戶</th>'+
    '<th style="padding:10px 12px;">模式</th>'+
    '<th style="padding:10px 12px;">商務夥伴</th>'+
    '<th style="text-align:right;padding:10px 12px;">客戶收款</th>'+
    '<th style="text-align:right;padding:10px 12px;">服務商成本</th>'+
    '<th style="text-align:right;padding:10px 12px;">差額（毛利）</th>'+
    '<th style="text-align:right;padding:10px 12px;">商務獎金（含稅）</th>'+
    '<th style="padding:10px 12px;width:76px;">支付狀態</th>'+
    '<th style="padding:10px 12px;width:100px;">最後操作人</th>'+
    '<th style="padding:10px 12px;width:96px;text-align:right;">操作</th>'+
  '</tr></thead>';

  var bodyHtml='';
  slicePids.forEach(function(pid){
    var recs=groups[pid];
    var expanded=!!crecExpanded[pid];
    var proj=_find(DB.projects,pid);
    var finRecs=(DB.financial_records_all||[]).filter(function(f){ return f.project_id===pid; });
    var pprRecs=(DB.provider_payment_records_all||[]).filter(function(r){ return r.project_id===pid; });

    // 彙總金額
    var clientRecv=finRecs.filter(function(f){ return f.record_type==='receivable'; }).reduce(function(a,f){ return a+Number(f.amount||0); },0);
    var spCostTotal=finRecs.filter(function(f){ return f.record_type==='payable_provider'; }).reduce(function(a,f){ return a+Number(f.amount||0); },0);
    // 若 financial_records 無資料，退而用 provider_payment_records
    if(!spCostTotal) spCostTotal=pprRecs.reduce(function(a,r){ return a+Number(r.amount_twd||0); },0);
    var profitTotal=recs.reduce(function(a,c){ return a+Number(c.profit_untaxed||0); },0);
    var partnerTotal=recs.reduce(function(a,c){ return a+Number(c.partner_amount_taxed||0); },0);
    var mode=proj&&proj.cooperation_mode;
    var isIntermediary=mode==='intermediary';
    // 偵測專案層級的 FX（若所有 SP 幣別相同且非 TWD，就在摘要列顯示原始幣別）
    var _projFxFirstCur=null; var _projFxAllSame=true;
    recs.forEach(function(c){ var sp=_find(DB.service_providers,c.service_provider_id); var cur=(sp&&sp.payment_currency)||'TWD'; if(_projFxFirstCur===null) _projFxFirstCur=cur; else if(_projFxFirstCur!==cur) _projFxAllSame=false; });
    // projFx 優先採用帳務 payable_provider 上存的鎖定匯率（修正 #3），否則 fallback
    var _projPpFx=finRecs.find(function(f){ return f.record_type==='payable_provider'&&f.fx_rate>0&&f.orig_currency&&f.orig_currency!=='TWD'; });
    var projFx=_projPpFx?{cur:_projPpFx.orig_currency,rate:Number(_projPpFx.fx_rate)}:((_projFxAllSame&&_projFxFirstCur&&_projFxFirstCur!=='TWD'&&recs.length)?_spFxRateRec(recs[0],pid):null);
    // 偵測專案層級的 BP 幣別（所有 BP 幣別相同且非 TWD 才統一顯示外幣）— 摘要列與合計列共用
    var _bpFxFirst=null; var _bpFxSame=true;
    recs.forEach(function(c){ if(!c.business_partner_id) return; var bf=_bpFxRateRec(c); var cur=bf?bf.cur:'TWD'; if(_bpFxFirst===null) _bpFxFirst=cur; else if(_bpFxFirst!==cur) _bpFxSame=false; });
    var _bpHasBp=recs.some(function(c){ return !!c.business_partner_id; });
    var projBpFx=(_bpFxSame&&_bpFxFirst&&_bpFxFirst!=='TWD'&&_bpHasBp)?_bpFxRateRec(recs.find(function(c){ return !!c.business_partner_id; })):null;

    var allPaid=recs.every(function(c){ return (c.partner_payment_status||'pending')==='paid'; });
    var noBp=recs.every(function(c){ return !c.business_partner_id; });
    var modeTag=mode==='intermediary'?_badge('居間','amber'):_badge('主理人','blue');
    var bpNames=[...new Set(recs.map(function(c){ return c.business_partner_id?_bpName(c.business_partner_id):''; }).filter(Boolean))].join('、')||'—';
